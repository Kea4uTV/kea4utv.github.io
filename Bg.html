```html
<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart PNG Background Remover</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@100..700&display=swap');
        body { font-family: 'Kantumruy Pro', sans-serif; }
        .transparent-bg {
            background-image: linear-gradient(45deg, #e5e7eb 25%, transparent 25%), 
                              linear-gradient(-45deg, #e5e7eb 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #e5e7eb 75%), 
                              linear-gradient(-45deg, transparent 75%, #e5e7eb 75%);
            background-size: 15px 15px;
            background-position: 0 0, 0 7.5px, 7.5px -7.5px, -7.5px 0px;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-12">

    <div class="max-w-6xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black text-indigo-600 mb-2 flex items-center justify-center gap-3">
                <i class="fas fa-magic"></i> Smart PNG Remover
            </h1>
            <p class="text-slate-500">កាត់រូបភាពឱ្យថ្លា (Transparent) ដោយប្រើបច្ចេកវិទ្យា AI ចុងក្រោយ</p>
        </header>

        <!-- Control Center -->
        <div class="bg-white rounded-3xl shadow-xl shadow-slate-200/60 border border-slate-100 p-6 mb-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wide">ជម្រើស AI (Logic)</label>
                    <select id="logicSelect" class="w-full p-4 rounded-2xl bg-slate-50 border-none ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none appearance-none font-medium">
                        <option value="Remove the background completely and precisely. Return only the subject with a transparent background.">លុបផ្ទៃខាងក្រោយធម្មតា</option>
                        <option value="Detect the person, keep only the person, and remove all other background elements. Return a transparent PNG.">កាត់យកតែរូបមនុស្ស</option>
                        <option value="Detect the product or object, remove all surrounding background. Return a transparent PNG.">កាត់យកតែផលិតផល/វត្ថុ</option>
                        <option value="Extract only logos or text, making the background fully transparent.">កាត់យកតែ Logo ឬ អក្សរ</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wide">បញ្ជាបន្ថែម (Optional)</label>
                    <input type="text" id="customPrompt" placeholder="ឧ៖ កាត់យកតែផ្កាឈូក..." class="w-full p-4 rounded-2xl bg-slate-50 border-none ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
            </div>

            <div class="flex flex-col md:flex-row gap-4">
                <div id="dropZone" class="flex-1 cursor-pointer bg-indigo-50/30 hover:bg-indigo-50 border-2 border-dashed border-indigo-200 rounded-3xl p-8 flex flex-col items-center justify-center transition-all group">
                    <i class="fas fa-cloud-upload-alt text-4xl text-indigo-400 mb-3 group-hover:scale-110 transition-transform"></i>
                    <span class="font-bold text-indigo-600">បន្ថែមរូបភាពនៅទីនេះ</span>
                    <p class="text-xs text-slate-400 mt-1 uppercase tracking-widest">JPG, PNG, WEBP</p>
                    <input type="file" id="fileInput" multiple accept="image/*" class="hidden">
                </div>

                <div class="flex flex-col gap-3 min-w-[280px]">
                    <button id="startBtn" disabled class="flex-1 px-8 py-4 bg-slate-200 text-slate-400 rounded-2xl font-black flex items-center justify-center gap-3 transition-all cursor-not-allowed">
                        <i class="fas fa-wand-sparkles"></i> ចាប់ផ្ដើមដំណើរការ
                    </button>
                    <button id="downloadAllBtn" class="hidden px-8 py-4 bg-emerald-500 text-white rounded-2xl font-black items-center justify-center gap-3 shadow-lg shadow-emerald-100 transition-all hover:bg-emerald-600 active:scale-95">
                        <i class="fas fa-file-export"></i> ទាញយក PNG ទាំងអស់
                    </button>
                </div>
            </div>
        </div>

        <!-- Global Progress -->
        <div id="globalProgress" class="hidden mb-8 bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
            <div class="flex justify-between items-center mb-3">
                <span class="text-sm font-bold text-indigo-600 uppercase tracking-wider">ដំណើរការ: <span id="percentText">0%</span></span>
                <span id="counterText" class="text-xs text-slate-400 font-bold uppercase">0 / 0 រូបភាព</span>
            </div>
            <div class="w-full h-3 bg-slate-100 rounded-full overflow-hidden">
                <div id="progressBar" class="h-full bg-gradient-to-r from-indigo-500 to-purple-600 w-0 transition-all duration-500"></div>
            </div>
        </div>

        <!-- Gallery -->
        <div id="gallery" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>

        <!-- Empty State -->
        <div id="emptyState" class="py-32 flex flex-col items-center justify-center text-slate-300">
            <div class="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mb-4">
                <i class="fas fa-images text-3xl opacity-20"></i>
            </div>
            <p class="text-lg font-bold">មិនទាន់មានរូបភាព</p>
        </div>
    </div>

    <script>
        const apiKey = ""; // API Key Provided at Runtime
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const gallery = document.getElementById('gallery');
        const startBtn = document.getElementById('startBtn');
        const downloadAllBtn = document.getElementById('downloadAllBtn');
        const emptyState = document.getElementById('emptyState');
        const globalProgress = document.getElementById('globalProgress');
        const progressBar = document.getElementById('progressBar');
        const percentText = document.getElementById('percentText');
        const counterText = document.getElementById('counterText');

        let imageList = [];
        let isProcessing = false;

        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', handleFiles);
        startBtn.addEventListener('click', startProcessing);
        downloadAllBtn.addEventListener('click', downloadAll);

        function handleFiles(e) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            emptyState.classList.add('hidden');
            startBtn.disabled = false;
            startBtn.className = "flex-1 px-8 py-4 bg-indigo-600 text-white rounded-2xl font-black flex items-center justify-center gap-3 transition-all hover:bg-indigo-700 shadow-lg shadow-indigo-100 active:scale-95";

            files.forEach(file => {
                const id = Math.random().toString(36).substr(2, 9);
                const reader = new FileReader();
                reader.onload = (event) => {
                    const imgObj = {
                        id,
                        file,
                        preview: event.target.result,
                        status: 'pending',
                        result: null,
                        name: file.name.split('.')[0]
                    };
                    imageList.push(imgObj);
                    renderItem(imgObj);
                };
                reader.readAsDataURL(file);
            });
        }

        function renderItem(img) {
            const item = document.createElement('div');
            item.id = `item-${img.id}`;
            item.className = "bg-white rounded-3xl overflow-hidden shadow-sm border border-slate-100 transition-all hover:shadow-xl relative group";
            item.innerHTML = `
                <div class="aspect-[4/5] relative overflow-hidden transparent-bg flex items-center justify-center">
                    <img src="${img.preview}" id="img-${img.id}" class="max-w-full max-h-full object-contain p-2 transition-all duration-500">
                    <div id="loader-${img.id}" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-white/60 backdrop-blur-[2px]">
                        <div class="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                        <span class="mt-3 text-[10px] font-black text-indigo-700 bg-white px-3 py-1 rounded-full shadow-sm">កំពុងកាត់...</span>
                    </div>
                    <div id="badge-${img.id}" class="hidden absolute top-3 right-3 bg-emerald-500 text-white w-7 h-7 flex items-center justify-center rounded-full shadow-lg ring-2 ring-white">
                        <i class="fas fa-check text-xs"></i>
                    </div>
                    <div id="error-${img.id}" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-red-50/90 text-red-500 p-4 text-center">
                        <i class="fas fa-exclamation-triangle text-2xl mb-2"></i>
                        <span class="text-[10px] font-bold">Error ក្នុងការកាត់</span>
                    </div>
                </div>
                <div class="p-4 flex items-center justify-between bg-white">
                    <span class="text-[10px] font-bold text-slate-400 truncate max-w-[100px] uppercase">${img.name}</span>
                    <div class="flex gap-2">
                        <button onclick="downloadOne('${img.id}')" id="dl-${img.id}" class="hidden p-2 bg-emerald-50 text-emerald-600 rounded-lg hover:bg-emerald-100 transition-colors">
                            <i class="fas fa-download"></i>
                        </button>
                        <button onclick="removeItem('${img.id}')" class="p-2 bg-slate-50 text-slate-300 rounded-lg hover:bg-red-50 hover:text-red-500 transition-colors">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            `;
            gallery.appendChild(item);
        }

        async function startProcessing() {
            if (isProcessing) return;
            isProcessing = true;
            startBtn.disabled = true;
            startBtn.innerHTML = `<i class="fas fa-circle-notch animate-spin"></i> កំពុងដំណើរការ...`;
            globalProgress.classList.remove('hidden');
            
            const logic = document.getElementById('logicSelect').value;
            const custom = document.getElementById('customPrompt').value;
            const prompt = custom || logic;

            let completed = 0;
            const itemsToProcess = imageList.filter(img => img.status !== 'completed');
            const total = itemsToProcess.length;

            for (let i = 0; i < imageList.length; i++) {
                if (imageList[i].status === 'completed') continue;

                const img = imageList[i];
                document.getElementById(`loader-${img.id}`).classList.remove('hidden');
                document.getElementById(`error-${img.id}`).classList.add('hidden');

                const result = await processWithRetry(img, prompt);

                if (result) {
                    img.status = 'completed';
                    img.result = result;
                    const imgEl = document.getElementById(`img-${img.id}`);
                    imgEl.src = result;
                    document.getElementById(`badge-${img.id}`).classList.remove('hidden');
                    document.getElementById(`dl-${img.id}`).classList.remove('hidden');
                } else {
                    img.status = 'error';
                    document.getElementById(`error-${img.id}`).classList.remove('hidden');
                }

                document.getElementById(`loader-${img.id}`).classList.add('hidden');
                
                completed++;
                const percent = Math.round((completed / total) * 100);
                progressBar.style.width = `${percent}%`;
                percentText.innerText = `${percent}%`;
                counterText.innerText = `${completed} / ${total}`;
            }

            isProcessing = false;
            startBtn.disabled = false;
            startBtn.innerHTML = `<i class="fas fa-wand-sparkles"></i> ចាប់ផ្ដើមដំណើរការ`;
            downloadAllBtn.classList.remove('hidden');
            downloadAllBtn.classList.add('flex');
        }

        async function processWithRetry(imgObj, promptText, retries = 5) {
            for (let i = 0; i < retries; i++) {
                const result = await callGeminiAPI(imgObj, promptText);
                if (result) return result;
                // Exponential backoff
                await new Promise(res => setTimeout(res, Math.pow(2, i) * 1000));
            }
            return null;
        }

        async function callGeminiAPI(imgObj, promptText) {
            try {
                const base64Data = imgObj.preview.split(',')[1];
                const payload = {
                    contents: [{
                        parts: [
                            { text: promptText + " Return ONLY the processed image content as a high-quality transparent PNG. DO NOT include any text or descriptions." },
                            { inlineData: { mimeType: imgObj.file.type, data: base64Data } }
                        ]
                    }],
                    generationConfig: { 
                        responseModalities: ["IMAGE"] 
                    }
                };

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) return null;

                const data = await response.json();
                const imagePart = data.candidates?.[0]?.content?.parts?.find(p => p.inlineData);
                return imagePart ? `data:image/png;base64,${imagePart.inlineData.data}` : null;
            } catch (e) {
                console.error("API Error:", e);
                return null;
            }
        }

        window.removeItem = (id) => {
            imageList = imageList.filter(img => img.id !== id);
            const el = document.getElementById(`item-${id}`);
            if (el) el.remove();
            if (imageList.length === 0) {
                emptyState.classList.remove('hidden');
                startBtn.disabled = true;
                globalProgress.classList.add('hidden');
                downloadAllBtn.classList.add('hidden');
            }
        };

        window.downloadOne = (id) => {
            const img = imageList.find(i => i.id === id);
            if (img && img.result) {
                const link = document.createElement('a');
                link.href = img.result;
                link.download = `${img.name}-transparent.png`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        };

        function downloadAll() {
            imageList.forEach(img => {
                if (img.status === 'completed') downloadOne(img.id);
            });
        }
    </script>
</body>
</html>
