<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khmer Open-Source AI TTS</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruuy+Pro:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kantumruuy Pro', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-2xl bg-slate-800 rounded-2xl shadow-2xl p-6 border border-slate-700">
        <!-- Header -->
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold text-emerald-400 mb-2">Khmer AI Text-to-Speech</h1>
            <p class="text-sm text-slate-400">ប្រព័ន្ធបំប្លែងអត្ថបទទៅជាសំឡេងខ្មែរ Open-Source គ្មានដែនកំណត់</p>
        </div>

        <!-- Input Area -->
        <div class="mb-5">
            <label class="block text-sm font-semibold text-slate-300 mb-2">បញ្ចូលអត្ថបទភាសាខ្មែរ៖</label>
            <textarea id="khmerText" rows="6" 
                class="w-full p-4 bg-slate-950 border border-slate-700 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:outline-none resize-none text-slate-200 placeholder-slate-500 text-lg"
                placeholder="សរសេរ ឬចម្លងអត្ថបទរបស់អ្នកដាក់ទីនេះ..."></textarea>
        </div>

        <!-- Action Button -->
        <button id="generateBtn" onclick="generateSpeech()"
            class="w-full bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold py-3.5 px-4 rounded-xl transition duration-200 flex items-center justify-center gap-2 cursor-pointer shadow-lg shadow-emerald-500/20">
            <span id="btnText">ផលិតសំឡេង (Generate)</span>
            <div id="loadingSpinner" class="hidden w-5 h-5 border-3 border-slate-950 border-t-transparent rounded-full animate-spin"></div>
        </button>

        <!-- Output Audio Player -->
        <div id="audioContainer" class="mt-6 p-4 bg-slate-950 rounded-xl border border-slate-800 hidden animate-fade-in">
            <p class="text-sm font-medium text-emerald-400 mb-2">លទ្ធផលសំឡេង៖</p>
            <audio id="audioPlayer" controls class="w-full mt-1 bg-slate-900 rounded-lg"></audio>
            <div class="mt-3 flex justify-end">
                <a id="downloadBtn" download="khmer_speech.wav" 
                   class="text-xs bg-slate-800 hover:bg-slate-700 border border-slate-700 px-4 py-2 rounded-lg font-semibold transition cursor-pointer">
                    ទាញយកហ្វាយ (.wav)
                </a>
            </div>
        </div>
    </div>

    <script>
        async function generateSpeech() {
            const text = document.getElementById('khmerText').value;
            const btn = document.getElementById('generateBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('loadingSpinner');
            const audioContainer = document.getElementById('audioContainer');
            const audioPlayer = document.getElementById('audioPlayer');
            const downloadBtn = document.getElementById('downloadBtn');

            if (!text.trim()) {
                alert('សូមបញ្ចូលអត្ថបទជាមុនសិន!');
                return;
            }

            // បង្ហាញ Loading State
            btn.disabled = true;
            btnText.innerText = 'កំពុងផលិត...';
            spinner.classList.remove('hidden');
            audioContainer.classList.add('hidden');

            try {
                const response = await fetch('https://kounsokea-aitext.hf.space/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });

                if (!response.ok) throw new Error('ការផលិតសំឡេងមានបញ្ហា');

                const blob = await response.blob();
                const audioUrl = URL.createObjectURL(blob);
                
                // ដាក់ទៅក្នុង Audio Player
                audioPlayer.src = audioUrl;
                downloadBtn.href = audioUrl;
                
                // បង្ហាញ Player
                audioContainer.classList.remove('hidden');
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                // បិទ Loading State វិញ
                btn.disabled = false;
                btnText.innerText = 'ផលិតសំឡេង (Generate)';
                spinner.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
