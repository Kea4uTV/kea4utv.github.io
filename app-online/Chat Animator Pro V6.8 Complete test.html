<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Animator Pro V6.8 Complete Restoration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Battambang:wght@400;700&family=Koulen&family=Moul&family=Freehand&family=Dangrek&family=Odor+Mean+Chey&family=Fascinate&display=swap');
        
        :root { --primary: #2563eb; }
        body { font-family: 'Battambang', sans-serif; background-color: #f1f5f9; color: #1e293b; overflow-x: hidden; }

        /* Canvas Styles */
        #canvasWrapper {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            background-color: #000;
            overflow: hidden;
            border-radius: 2rem;
            margin: auto;
        }

        .canvas-area {
            position: relative;
            display: flex;
            width: 100%;
            height: 100%;
            z-index: 2;
            padding: 20px;
            box-sizing: border-box;
        }

        #bgLayer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            background-size: cover;
            background-position: center;
        }

        /* Animations */
        @keyframes slide-in-bottom { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slide-in-left { from { opacity: 0; transform: translateX(-50px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes slide-in-right { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes zoom-in { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
        @keyframes fade-out { from { opacity: 1; transform: scale(1); } to { opacity: 0; transform: scale(0.9); } }

        .msg-entry-bottom { animation: slide-in-bottom 0.5s ease-out forwards; }
        .msg-entry-left { animation: slide-in-left 0.5s ease-out forwards; }
        .msg-entry-right { animation: slide-in-right 0.5s ease-out forwards; }
        .msg-entry-zoom { animation: zoom-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .msg-exit-fade { animation: fade-out 0.5s ease-in forwards; }

        .active-msg { z-index: 100; transform: scale(1.05); transition: transform 0.3s; }
        .inactive-msg { opacity: 0.4; filter: blur(1px); transition: all 0.5s; }

        /* UI Elements */
        .control-section { background: white; border-radius: 16px; padding: 20px; margin-bottom: 20px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .label-sm { font-size: 11px; font-weight: 800; color: #64748b; margin-bottom: 5px; display: block; text-transform: uppercase; letter-spacing: 0.05em; }
        .input-ui { width: 100%; border: 1px solid #cbd5e1; padding: 8px 12px; border-radius: 8px; font-size: 13px; outline: none; transition: all 0.2s; }
        .input-ui:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        
        #aiLoading {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(8px); z-index: 10000; align-items: center; justify-content: center;
        }

        /* Custom Scrollbar for Controls */
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-4 lg:p-8">

    <div id="aiLoading">
        <div class="text-center">
            <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-blue-600 mx-auto mb-4"></div>
            <p class="font-black text-slate-800 text-lg font-moul">កំពុងវិភាគតួនាទី និងបង្កើតស្គ្រីប...</p>
        </div>
    </div>

    <div class="max-w-[1700px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- Left: Comprehensive Controls -->
        <div class="lg:col-span-8 space-y-6 h-[90vh] overflow-y-auto pr-2 custom-scroll">
            
            <div class="flex items-center justify-between sticky top-0 bg-[#f1f5f9] z-50 py-2">
                <div>
                    <h1 class="text-3xl font-black text-slate-900 leading-none">CHAT <span class="text-blue-600">ANIMATOR</span></h1>
                    <p class="text-[10px] font-bold text-slate-400">V6.8 COMPLETE RESTORATION</p>
                </div>
                <div class="flex gap-2">
                    <button id="playBtn" onclick="playPreview()" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-xl font-black shadow-xl transition transform active:scale-95 flex items-center gap-2">
                        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> ផលិតវីដេអូ
                    </button>
                </div>
            </div>

            <!-- ១. AI Engine -->
            <div class="control-section border-l-4 border-blue-600 bg-blue-50/30">
                <h3 class="font-black text-blue-600 mb-4 flex items-center gap-2">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                    AI Script Generator (តាមឋានៈតួអង្គ)
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-12 gap-4">
                    <div class="md:col-span-8">
                        <label class="label-sm">ប្រធានបទសន្ទនា</label>
                        <input type="text" id="aiTopic" placeholder="ឧ៖ ការពិភាក្សារវាងមេបញ្ជាការ និងកូនចៅ..." class="input-ui">
                    </div>
                    <div class="md:col-span-2">
                        <label class="label-sm">ចំនួនសារ</label>
                        <input type="number" id="aiMsgCount" value="6" class="input-ui">
                    </div>
                    <div class="md:col-span-2 self-end">
                        <button onclick="generateAIScript()" class="w-full bg-slate-900 text-white h-10 rounded-lg font-bold text-xs hover:bg-black">GENERATE</button>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- ២. ស្ទាយអក្សរ & Fonts -->
                <div class="control-section">
                    <h3 class="font-black text-slate-800 mb-4 pb-2 border-b uppercase text-xs tracking-widest">២. ស្ទាយអក្សរ & Fonts</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="label-sm">Font ផ្ទាល់ខ្លួន (Google Font Name)</label>
                            <input type="text" id="customFontName" placeholder="ឧ៖ Odor Mean Chey" oninput="updateCanvasStyles()" class="input-ui">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="label-sm">ជ្រើសរើស Font</label>
                                <select id="fontFamily" onchange="updateCanvasStyles()" class="input-ui">
                                    <option value="font-battambang">Battambang</option>
                                    <option value="font-koulen">Koulen</option>
                                    <option value="font-moul">Moul</option>
                                    <option value="font-dangrek">Dangrek</option>
                                </select>
                            </div>
                            <div>
                                <label class="label-sm">ទំហំ (px)</label>
                                <input type="number" id="fontSize" value="16" oninput="updateCanvasStyles()" class="input-ui">
                            </div>
                        </div>
                        <div>
                            <label class="label-sm">កោង Bubble (px)</label>
                            <input type="range" id="bubbleRadius" min="0" max="40" value="20" oninput="updateCanvasStyles()" class="w-full h-2 bg-slate-100 rounded-lg appearance-none cursor-pointer">
                        </div>
                    </div>
                </div>

                <!-- ៣. ប្លង់ & របៀបបង្ហាញសារ (View Mode) -->
                <div class="control-section">
                    <h3 class="font-black text-slate-800 mb-4 pb-2 border-b uppercase text-xs tracking-widest">៣. ប្លង់ & View Mode</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="label-sm">របៀបបង្ហាញ</label>
                            <select id="viewMode" onchange="updateCanvasStyles()" class="input-ui">
                                <option value="flow">ហូរឡើងលើ (Flow)</option>
                                <option value="single">បង្ហាញម្តងមួយ (Single)</option>
                                <option value="highlight">Highlight សារថ្មី</option>
                            </select>
                        </div>
                        <div>
                            <label class="label-sm">បង្ហាញយូរ (s)</label>
                            <input type="number" id="stayTime" value="2.5" step="0.5" class="input-ui">
                        </div>
                        <div>
                            <label class="label-sm">ចលនាចូល (Entry)</label>
                            <select id="entryAnim" class="input-ui">
                                <option value="msg-entry-bottom">Slide Up</option>
                                <option value="msg-entry-left">Slide In Left</option>
                                <option value="msg-entry-right">Slide In Right</option>
                                <option value="msg-entry-zoom">Zoom Pop</option>
                            </select>
                        </div>
                        <div>
                            <label class="label-sm">ចលនាចេញ (Exit)</label>
                            <select id="exitAnim" class="input-ui">
                                <option value="none">គ្មាន</option>
                                <option value="msg-exit-fade">Fade Out</option>
                            </select>
                        </div>
                        <div>
                            <label class="label-sm">Canvas (W x H)</label>
                            <div class="flex gap-1">
                                <input type="number" id="canvasW" value="360" oninput="updateCanvasStyles()" class="input-ui px-1 text-center">
                                <input type="number" id="canvasH" value="640" oninput="updateCanvasStyles()" class="input-ui px-1 text-center">
                            </div>
                        </div>
                        <div>
                            <label class="label-sm">V-Align / Flow</label>
                            <select id="vAlign" onchange="updateCanvasStyles()" class="input-ui">
                                <option value="flex-end">ពីក្រោមឡើង (Bottom)</option>
                                <option value="flex-start">ពីលើចុះ (Top)</option>
                                <option value="center">ចំកណ្តាល (Center)</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ៤. តួអង្គ & Profile -->
            <div class="control-section border-t-4 border-rose-500">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-black text-rose-600 text-lg uppercase">៤. តួអង្គ & ឋានៈ</h3>
                    <button onclick="addProfile()" class="bg-rose-600 text-white px-4 py-2 rounded-lg text-xs font-black shadow-lg hover:bg-rose-700 transition">+ បន្ថែមតួអង្គ</button>
                </div>
                <div id="profilesContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>

            <!-- ៥. បញ្ជីសារ (Messages) -->
            <div class="control-section border-t-4 border-emerald-500">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-black text-emerald-600 text-lg uppercase">៥. បញ្ជីសារ & សំឡេង</h3>
                    <button onclick="addMessage()" class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-xs font-black shadow-lg hover:bg-emerald-700 transition">+ បន្ថែមសារ</button>
                </div>
                <div id="messagesContainer" class="space-y-4"></div>
            </div>

            <!-- ៦. Global Audio & SFX -->
            <div class="control-section">
                <h3 class="font-black text-slate-800 mb-4 uppercase text-xs tracking-widest">៦. សំឡេងរួម (Global Audio)</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label class="label-sm">តន្ត្រីផ្ទៃក្រោយ (BGM)</label>
                        <input type="file" accept="audio/*" onchange="loadAudioFile(event, 'bgMusicPlayer')" class="text-xs w-full">
                    </div>
                    <div>
                        <label class="label-sm">Global SFX (ពេលសារលោត)</label>
                        <input type="file" accept="audio/*" onchange="loadAudioFile(event, 'globalSfxPlayer')" class="text-xs w-full">
                    </div>
                    <div>
                        <label class="label-sm">កម្រិតសំឡេង BGM (0-1)</label>
                        <input type="range" id="bgVol" min="0" max="1" step="0.1" value="0.3" class="w-full">
                    </div>
                </div>
            </div>
        </div>

        <!-- Right: Realtime Preview -->
        <div class="lg:col-span-4 flex flex-col items-center">
            <div class="sticky top-10">
                <div id="canvasWrapper">
                    <div id="bgLayer"></div>
                    <div id="mainCanvas" class="canvas-area">
                        <div id="messageFlow" class="flex flex-col w-full gap-4">
                            <!-- Bubbles generate here -->
                        </div>
                    </div>
                </div>
                
                <div class="mt-6 w-full max-w-[360px]">
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-[10px] font-black text-slate-400">AUDIO PROGRESS</span>
                            <span id="audioTimer" class="text-[10px] font-mono font-bold text-blue-600">00:00 / 00:00</span>
                        </div>
                        <div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                            <div id="musicProgress" class="bg-blue-600 h-full w-0 transition-all duration-300"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden Audio Engines -->
    <audio id="bgMusicPlayer" loop></audio>
    <audio id="globalSfxPlayer"></audio>
    <audio id="voicePlayer"></audio>
    <audio id="msgSfxPlayer"></audio>

    <script>
        const apiKey = "";
        let state = {
            isPlaying: false,
            canvas: { 
                width: 360, height: 640, 
                bgImage: '', bgSizeMode: 'bg-fill',
                fontFamily: 'font-battambang', customFont: '', fontSize: 16, bubbleRadius: 20,
                viewMode: 'flow', vAlign: 'flex-end', stayTime: 2.5
            },
            profiles: [
                { id: 'p1', name: 'មេបញ្ជាការ', role: 'Leader', color: '#1e293b', align: 'right', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Felix', scale: 1 },
                { id: 'p2', name: 'សុខា', role: 'Soldier', color: '#059669', align: 'left', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Jack', scale: 1 }
            ],
            messages: [
                { id: 'm1', profileId: 'p1', text: 'តើការងារបានសម្រេចដល់ណាហើយ?', delay: 1, sfx: '', voice: '' },
                { id: 'm2', profileId: 'p2', text: 'រួចរាល់ហើយទាន! កំពុងត្រៀមបញ្ជូន។', delay: 1.5, sfx: '', voice: '' }
            ]
        };

        // --- AI Script Engine ---
        async function generateAIScript() {
            const topic = document.getElementById('aiTopic').value;
            const count = document.getElementById('aiMsgCount').value;
            if (!topic) return;
            
            document.getElementById('aiLoading').style.display = 'flex';
            const context = state.profiles.map(p => `Name: "${p.name}", Role: "${p.role}"`).join(' | ');
            const prompt = `Create Khmer chat. Topic: ${topic}. Characters: ${context}. Messages: ${count}. Return JSON: [{"name": "Name", "text": "Khmer Text"}]`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } })
                });
                const data = await response.json();
                const script = JSON.parse(data.candidates[0].content.parts[0].text);
                
                state.messages = script.map((s, idx) => {
                    const profile = state.profiles.find(p => p.name === s.name) || state.profiles[idx % state.profiles.length];
                    return { id: 'm'+Date.now()+idx, profileId: profile.id, text: s.text, delay: 1.5, sfx: '', voice: '' };
                });
                renderMessages();
            } catch (e) { console.error(e); }
            finally { document.getElementById('aiLoading').style.display = 'none'; }
        }

        // --- Playback Engine ---
        async function playPreview() {
            if (state.isPlaying) return;
            state.isPlaying = true;
            
            const flow = document.getElementById('messageFlow');
            const bgMusic = document.getElementById('bgMusicPlayer');
            const globalSfx = document.getElementById('globalSfxPlayer');
            const playBtn = document.getElementById('playBtn');
            
            flow.innerHTML = '';
            playBtn.innerHTML = `<span class="animate-pulse">កំពុងផលិត...</span>`;
            
            if (bgMusic.src) { bgMusic.volume = parseFloat(document.getElementById('bgVol').value); bgMusic.play(); }

            for (let i = 0; i < state.messages.length; i++) {
                const m = state.messages[i];
                const viewMode = state.canvas.viewMode;
                
                // Delay before message
                await new Promise(r => setTimeout(r, m.delay * 1000));

                // View Mode Logic
                if (viewMode === 'single') flow.innerHTML = '';
                if (viewMode === 'highlight') {
                    flow.querySelectorAll('.bubble-wrap').forEach(el => el.classList.add('inactive-msg'));
                }

                // Global SFX
                if (globalSfx.src) { globalSfx.currentTime = 0; globalSfx.play(); }

                // Message SFX
                if (m.sfx) { const sfxP = document.getElementById('msgSfxPlayer'); sfxP.src = m.sfx; sfxP.play(); }

                const bubble = renderBubble(m, true);
                bubble.classList.add('active-msg');

                // Voice / Wait
                if (m.voice) {
                    await playSound('voicePlayer', m.voice);
                } else {
                    await new Promise(r => setTimeout(r, state.canvas.stayTime * 1000));
                }

                // Exit Animation
                const exitType = document.getElementById('exitAnim').value;
                if (exitType !== 'none') {
                    bubble.classList.add(exitType);
                    await new Promise(r => setTimeout(r, 500));
                    if (viewMode === 'single') bubble.remove();
                }
            }

            state.isPlaying = false;
            playBtn.innerHTML = `<svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> ផលិតវីដេអូ`;
        }

        function renderBubble(msg, animate) {
            const flow = document.getElementById('messageFlow');
            const p = state.profiles.find(x => x.id === msg.profileId) || state.profiles[0];
            const isRight = p.align === 'right';
            const entryAnim = document.getElementById('entryAnim').value;
            
            const wrap = document.createElement('div');
            wrap.className = `bubble-wrap flex w-full ${isRight ? 'flex-row-reverse' : 'flex-row'} ${animate ? entryAnim : ''}`;
            
            const avatarSize = 40 * (p.scale || 1);
            const fontFamily = state.canvas.customFont ? '' : state.canvas.fontFamily;
            const customStyle = state.canvas.customFont ? `font-family: '${state.canvas.customFont}';` : '';

            wrap.innerHTML = `
                <div style="width: ${avatarSize}px; height: ${avatarSize}px;" class="shrink-0 mx-2 self-end">
                    <img src="${p.avatar}" class="w-full h-full rounded-full border-2 border-white shadow-md object-cover">
                </div>
                <div class="flex flex-col ${isRight ? 'items-end' : 'items-start'} max-w-[75%]">
                    <span class="text-[9px] font-black mb-1 text-white/70 px-1 uppercase">${p.name} ${p.role ? `• ${p.role}` : ''}</span>
                    <div class="${fontFamily} py-2.5 px-4 shadow-lg transition-all" style="
                        ${customStyle}
                        background-color: ${isRight ? p.color : '#ffffff'};
                        color: ${isRight ? '#ffffff' : '#1e293b'};
                        border-radius: ${state.canvas.bubbleRadius}px;
                        ${isRight ? 'border-bottom-right-radius: 4px;' : 'border-bottom-left-radius: 4px;'}
                        font-size: ${state.canvas.fontSize}px;
                        line-height: 1.4;
                    ">${msg.text}</div>
                </div>
            `;
            flow.appendChild(wrap);
            
            // Scroll Logic
            const area = document.getElementById('mainCanvas');
            if (state.canvas.vAlign === 'flex-end') area.scrollTo({ top: area.scrollHeight, behavior: 'smooth' });
            else area.scrollTo({ top: 0, behavior: 'smooth' });
            
            return wrap;
        }

        // --- UI Updates ---
        window.updateCanvasStyles = () => {
            state.canvas.width = document.getElementById('canvasW').value;
            state.canvas.height = document.getElementById('canvasH').value;
            state.canvas.fontFamily = document.getElementById('fontFamily').value;
            state.canvas.customFont = document.getElementById('customFontName').value;
            state.canvas.fontSize = document.getElementById('fontSize').value;
            state.canvas.bubbleRadius = document.getElementById('bubbleRadius').value;
            state.canvas.viewMode = document.getElementById('viewMode').value;
            state.canvas.vAlign = document.getElementById('vAlign').value;
            state.canvas.stayTime = parseFloat(document.getElementById('stayTime').value);

            const wrapper = document.getElementById('canvasWrapper');
            wrapper.style.width = state.canvas.width + 'px';
            wrapper.style.height = state.canvas.height + 'px';
            
            const area = document.getElementById('mainCanvas');
            area.style.alignItems = state.canvas.vAlign;
            
            const flow = document.getElementById('messageFlow');
            flow.style.flexDirection = (state.canvas.vAlign === 'flex-start') ? 'flex-col' : 'flex-col';

            if (!state.isPlaying) refreshStatic();
        };

        function refreshStatic() {
            const flow = document.getElementById('messageFlow');
            flow.innerHTML = '';
            state.messages.forEach(m => renderBubble(m, false));
        }

        window.renderProfiles = () => {
            const container = document.getElementById('profilesContainer');
            container.innerHTML = '';
            state.profiles.forEach(p => {
                const div = document.createElement('div');
                div.className = 'p-4 bg-white rounded-xl border shadow-sm flex flex-col gap-3';
                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="relative w-12 h-12 shrink-0">
                            <img src="${p.avatar}" class="w-full h-full rounded-full border shadow-inner object-cover">
                            <input type="file" accept="image/*" onchange="handleAvatar(event, '${p.id}')" class="absolute inset-0 opacity-0 cursor-pointer">
                        </div>
                        <div class="flex-1 grid grid-cols-2 gap-2">
                            <input type="text" value="${p.name}" oninput="updateProfile('${p.id}', 'name', this.value)" class="input-ui h-8 text-[11px] font-bold">
                            <input type="text" value="${p.role}" oninput="updateProfile('${p.id}', 'role', this.value)" class="input-ui h-8 text-[11px] bg-slate-50">
                        </div>
                        <button onclick="removeProfile('${p.id}')" class="text-rose-400 hover:text-rose-600">✕</button>
                    </div>
                    <div class="flex items-center gap-4">
                        <input type="color" value="${p.color}" oninput="updateProfile('${p.id}', 'color', this.value)" class="w-8 h-8 rounded-lg cursor-pointer">
                        <div class="flex-1 flex items-center gap-2">
                            <span class="text-[9px] font-black">SCALE</span>
                            <input type="range" min="0.7" max="1.5" step="0.1" value="${p.scale}" oninput="updateProfile('${p.id}', 'scale', parseFloat(this.value))" class="flex-1 h-1 bg-slate-200 rounded-lg">
                        </div>
                        <select onchange="updateProfile('${p.id}', 'align', this.value)" class="text-[10px] font-bold border-none bg-transparent">
                            <option value="left" ${p.align === 'left' ? 'selected' : ''}>ឆ្វេង</option>
                            <option value="right" ${p.align === 'right' ? 'selected' : ''}>ស្តាំ</option>
                        </select>
                    </div>
                `;
                container.appendChild(div);
            });
        };

        window.renderMessages = () => {
            const container = document.getElementById('messagesContainer');
            container.innerHTML = '';
            state.messages.forEach((m, i) => {
                const div = document.createElement('div');
                div.className = 'bg-white p-3 rounded-xl border shadow-sm space-y-3';
                let opts = state.profiles.map(p => `<option value="${p.id}" ${m.profileId === p.id ? 'selected' : ''}>${p.name}</option>`).join('');
                div.innerHTML = `
                    <div class="flex gap-2">
                        <select onchange="updateMessage(${i}, 'profileId', this.value)" class="input-ui w-24 h-9 text-[10px] font-black">${opts}</select>
                        <input type="text" value="${m.text}" oninput="updateMessage(${i}, 'text', this.value)" class="input-ui h-9 flex-1 text-xs">
                        <button onclick="removeMessage(${i})" class="text-slate-300 hover:text-rose-500">✕</button>
                    </div>
                    <div class="flex flex-wrap gap-4 items-center">
                        <div class="flex-1 grid grid-cols-2 gap-2">
                            <div>
                                <label class="text-[9px] font-bold text-emerald-600 block">SFX (MP3)</label>
                                <input type="file" accept="audio/*" onchange="handleMsgFile(event, ${i}, 'sfx')" class="text-[9px] w-full">
                            </div>
                            <div>
                                <label class="text-[9px] font-bold text-blue-600 block">VOICE (MP3)</label>
                                <input type="file" accept="audio/*" onchange="handleMsgFile(event, ${i}, 'voice')" class="text-[9px] w-full">
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            <label class="text-[9px] font-bold text-slate-400">ពន្យារ (s)</label>
                            <input type="number" value="${m.delay}" step="0.5" oninput="updateMessage(${i}, 'delay', parseFloat(this.value))" class="w-10 border rounded h-6 text-[10px] text-center">
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
            if (!state.isPlaying) refreshStatic();
        };

        // --- Core Helpers ---
        async function playSound(id, src) {
            const p = document.getElementById(id); p.src = src;
            return new Promise(r => { p.onended = r; p.onerror = r; p.play().catch(r); });
        }

        window.loadAudioFile = (e, tid) => { const f = e.target.files[0]; if(f){ const rd = new FileReader(); rd.onload = ev => { document.getElementById(tid).src = ev.target.result; }; rd.readAsDataURL(f); } };
        window.handleMsgFile = (e, i, k) => { const f = e.target.files[0]; if(f){ const rd = new FileReader(); rd.onload = ev => { state.messages[i][k] = ev.target.result; }; rd.readAsDataURL(f); } };
        window.handleAvatar = (e, id) => { const f = e.target.files[0]; if(f){ const rd = new FileReader(); rd.onload = ev => { const p = state.profiles.find(x => x.id === id); p.avatar = ev.target.result; renderProfiles(); refreshStatic(); }; rd.readAsDataURL(f); } };
        window.updateProfile = (id, k, v) => { const p = state.profiles.find(x => x.id === id); if(p) p[k] = v; renderProfiles(); if(k === 'name') renderMessages(); refreshStatic(); };
        window.addProfile = () => { const id = 'p'+Date.now(); state.profiles.push({ id, name: 'ថ្មី', role: '', color: '#2563eb', align: 'left', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed='+id, scale: 1 }); renderProfiles(); renderMessages(); };
        window.removeProfile = (id) => { state.profiles = state.profiles.filter(p => p.id !== id); renderProfiles(); renderMessages(); };
        window.updateMessage = (i, k, v) => { state.messages[i][k] = v; if(!state.isPlaying) refreshStatic(); };
        window.addMessage = () => { state.messages.push({ id: 'm'+Date.now(), profileId: state.profiles[0].id, text: '...', delay: 1, sfx: '', voice: '' }); renderMessages(); };
        window.removeMessage = (i) => { state.messages.splice(i, 1); renderMessages(); };

        // Audio Progress
        const bgAudio = document.getElementById('bgMusicPlayer');
        bgAudio.ontimeupdate = function() {
            const progress = (this.currentTime / this.duration) * 100;
            document.getElementById('musicProgress').style.width = progress + '%';
            
            const cur = Math.floor(this.currentTime);
            const dur = Math.floor(this.duration) || 0;
            const fmt = (s) => Math.floor(s/60).toString().padStart(2,'0') + ':' + (s%60).toString().padStart(2,'0');
            document.getElementById('audioTimer').innerText = `${fmt(cur)} / ${fmt(dur)}`;
        };

        window.onload = () => { updateCanvasStyles(); renderProfiles(); renderMessages(); };
    </script>
</body>
</html>
