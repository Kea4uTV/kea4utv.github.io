<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karaoke Studio Pro - Ultimate Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/wavesurfer.js"></script>
    <style>
        :root { --custom-font: 'Kantumruy Pro', sans-serif; }
        body { font-family: 'Kantumruy Pro', sans-serif; background-color: #020617; color: #f8fafc; overflow: hidden; }
        
        #previewArea {
            position: relative;
            background-color: #000;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        #canvasContainer {
            position: relative;
            background-color: var(--canvas-bg-color, #000000);
            background-image: var(--bg-image, none);
            background-size: var(--bg-size, cover);
            background-position: var(--bg-pos, center);
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            overflow: hidden;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: brightness(var(--adj-brightness, 1)) 
                    contrast(var(--adj-contrast, 1)) 
                    saturate(var(--adj-saturate, 1)) 
                    hue-rotate(var(--adj-hue, 0deg))
                    blur(var(--adj-blur, 0px))
                    sepia(var(--adj-sepia, 0));
        }

        /* Background Zoom Animation */
        #canvasContainer::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: inherit;
            background-size: inherit;
            background-position: inherit;
            z-index: -1;
            animation: var(--bg-animation, none);
        }

        @keyframes bgZoomInOut {
            0% { transform: scale(1); }
            50% { transform: scale(var(--bg-zoom-max, 1.2)); }
            100% { transform: scale(1); }
        }

        #vignette {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 12;
            background: radial-gradient(circle, transparent 50%, rgba(0,0,0,var(--vignette-opacity, 0)) 100%);
        }

        #logoOverlay {
            position: absolute;
            z-index: 50;
            width: var(--logo-width, 100px);
            top: var(--logo-y, 20px);
            left: var(--logo-x, 20px);
            opacity: var(--logo-opacity, 1);
            pointer-events: none;
        }

        #previewTextContainer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            pointer-events: none;
        }
        
        #previewText {
            width: 90%;
            transition: transform 0.1s linear;
            display: flex;
            flex-direction: column;
            transform: translate(var(--pos-x, 0px), var(--pos-y, 0px)) rotate(var(--rotation, 0deg));
        }

        #previewText[data-align="left"] { align-items: flex-start; text-align: left; }
        #previewText[data-align="center"] { align-items: center; text-align: center; }
        #previewText[data-align="right"] { align-items: flex-end; text-align: right; }

        .line-block { display: block; width: 100%; text-align: inherit; }

        .syllable-item {
            display: inline-block;
            position: relative;
            color: var(--primary-color, #ffffff);
            font-size: var(--font-size, 60px);
            font-weight: var(--font-bold, 700);
            font-style: var(--font-style, normal);
            text-decoration: var(--font-decoration, none);
            font-family: var(--active-font-family, 'Kantumruy Pro', sans-serif);
            margin: 0 var(--char-spacing, 4px);
            line-height: var(--line-height, 1.2);
            transform: scale(var(--scale-x, 1), var(--scale-y, 1));
            -webkit-text-stroke: var(--stroke-width, 2px) var(--stroke-color, #000000);
            paint-order: stroke fill;
            filter: drop-shadow(var(--shadow-dist-x, 2px) var(--shadow-dist-y, 2px) var(--shadow-blur, 4px) var(--shadow-color, rgba(0,0,0,0.8)));
            transition: color 0.1s linear;
        }

        .active-syllable { color: var(--secondary-color, #fbbf24) !important; }

        .opaque-box {
            background-color: var(--box-bg-color, transparent);
            border-radius: var(--box-rounded, 0px);
            padding: var(--box-padding-y, 10px) var(--box-padding-x, 20px);
            display: flex;
            flex-direction: column;
            width: var(--box-width, auto);
            height: var(--box-height, auto);
            opacity: var(--box-show, 1);
            transform: translate(var(--box-offset-x, 0px), var(--box-offset-y, 0px));
        }

        .control-tab { display: none; height: calc(100vh - 160px); overflow-y: auto; padding: 12px; }
        .control-tab.active { display: block; }
        .tab-btn { font-size: 8px; font-weight: 900; transition: all 0.2s; border-bottom: 2px solid transparent; }
        .tab-btn.active { border-bottom-color: #3b82f6; color: #3b82f6; background: rgba(59, 130, 246, 0.05); }
        
        .inspector-label { font-size: 8px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 4px; display: block; margin-top: 8px; }
        .input-group { background: rgba(30, 41, 59, 0.3); padding: 8px; border-radius: 6px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.05); }
        select, input[type="text"], textarea { background: #0f172a; border: 1px solid #334155; color: white; font-size: 10px; padding: 6px; border-radius: 4px; width: 100%; }
        input[type="range"] { accent-color: #3b82f6; height: 3px; width: 100%; cursor: pointer; }
        .grid-2 { display: grid; grid-template-cols: 1fr 1fr; gap: 8px; }

        /* Custom Switch */
        .switch { position: relative; display: inline-block; width: 28px; height: 16px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #334155; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #3b82f6; }
        input:checked + .slider:before { transform: translateX(12px); }

        #audio-timeline {
            position: relative;
            width: 100%;
            height: 12px;
            background: #1e293b;
            border-radius: 6px;
            margin-top: 4px;
            cursor: pointer;
            overflow: hidden;
        }
        #timeline-progress {
            position: absolute;
            height: 100%;
            background: #3b82f6;
            width: 0%;
            pointer-events: none;
        }
    </style>
</head>
<body class="h-screen flex flex-col bg-slate-950">

    <header class="p-3 bg-slate-900 border-b border-slate-800 flex justify-between items-center z-[1000] shadow-xl">
        <div class="flex items-center gap-3">
            <div class="p-2 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-lg shadow-lg text-white font-black">KS</div>
            <div>
                <h1 class="text-[11px] font-black text-white uppercase tracking-widest leading-none">Karaoke Studio</h1>
                <span class="text-[8px] text-blue-400 font-bold uppercase tracking-widest leading-none">Ultimate Studio v3.0</span>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="document.getElementById('audioInput').click()" class="bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded text-[9px] text-white border border-slate-700">AUDIO</button>
            <button onclick="document.getElementById('bgInput').click()" class="bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded text-[9px] text-white border border-slate-700">BG</button>
            <button onclick="document.getElementById('logoInput').click()" class="bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded text-[9px] text-white border border-slate-700">LOGO</button>
            <button onclick="document.getElementById('fontInput').click()" class="bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded text-[9px] text-white border border-slate-700">FONT</button>
            <button onclick="exportData()" class="bg-blue-600 hover:bg-blue-500 px-4 py-1.5 rounded text-[9px] font-black text-white shadow-lg">EXPORT</button>
            
            <input type="file" id="audioInput" accept="audio/*" class="hidden">
            <input type="file" id="bgInput" accept="image/*" class="hidden">
            <input type="file" id="logoInput" accept="image/*" class="hidden">
            <input type="file" id="fontInput" accept=".ttf,.otf,.woff" class="hidden" onchange="handleFontUpload(this)">
        </div>
    </header>

    <main class="flex-1 grid grid-cols-12 overflow-hidden">
        <!-- Sidebar content (Left) -->
        <aside class="col-span-2 border-r border-slate-800 flex flex-col bg-slate-900/40">
            <div class="p-3 border-b border-slate-800">
                <label class="inspector-label">Text Content</label>
                <textarea id="newLineInput" class="h-24 mb-2" placeholder="វាយអត្ថបទទីនេះ..."></textarea>
                <div class="grid grid-cols-2 gap-1">
                    <button onclick="addLineUnified()" class="bg-blue-600 py-2 rounded text-[9px] font-black">ADD LINE</button>
                    <button onclick="generateTTS()" class="bg-indigo-600 py-2 rounded text-[9px] font-black">TTS</button>
                </div>
            </div>
            <div id="lineList" class="flex-1 overflow-y-auto p-2 space-y-2"></div>
        </aside>

        <!-- Preview Area (Center) -->
        <section class="col-span-7 flex flex-col bg-black relative border-r border-slate-800">
            <div id="previewArea" class="flex-1">
                <div id="canvasContainer">
                    <img id="logoOverlay" src="" class="hidden">
                    <div id="vignette"></div>
                    <div id="previewTextContainer">
                        <div id="previewText" data-align="center"></div>
                    </div>
                </div>
            </div>
            
            <!-- Timeline & Controls -->
            <div class="p-3 bg-slate-900 border-t border-slate-800">
                <div id="waveform-container" class="relative">
                    <div id="waveform"></div>
                    <div id="audio-timeline" onclick="seekAudio(event)">
                        <div id="timeline-progress"></div>
                    </div>
                </div>
                
                <div class="flex items-center justify-between mt-3">
                    <div class="flex items-center gap-4">
                        <button onclick="wavesurfer.playPause()" id="playBtn" class="w-10 h-10 bg-blue-600 text-white rounded-full flex items-center justify-center shadow-lg transform active:scale-95">▶</button>
                        <div class="flex flex-col">
                            <span id="currentTimeDisp" class="text-xs font-mono text-white tracking-tighter">00:00.00</span>
                            <span id="durationDisp" class="text-[9px] font-mono text-slate-500">00:00.00</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <input type="range" min="10" max="1000" value="50" oninput="wavesurfer.zoom(this.value)" class="w-24">
                        <input type="range" min="0" max="1" step="0.1" value="1" oninput="wavesurfer.setVolume(this.value)" class="w-16">
                    </div>
                </div>
            </div>
        </section>

        <!-- Inspector (Right) -->
        <aside class="col-span-3 bg-slate-950 overflow-hidden flex flex-col">
            <div class="flex overflow-x-auto border-b border-slate-800 bg-slate-900 no-scrollbar">
                <button onclick="showTab('font')" class="tab-btn shrink-0 px-4 py-3 active">TEXT</button>
                <button onclick="showTab('style')" class="tab-btn shrink-0 px-4 py-3">LOOK</button>
                <button onclick="showTab('layout')" class="tab-btn shrink-0 px-4 py-3">POS</button>
                <button onclick="showTab('box')" class="tab-btn shrink-0 px-4 py-3">BOX</button>
                <button onclick="showTab('adj')" class="tab-btn shrink-0 px-4 py-3">IMAGE</button>
                <button onclick="showTab('logo')" class="tab-btn shrink-0 px-4 py-3">LOGO</button>
                <button onclick="showTab('sync')" class="tab-btn shrink-0 px-4 py-3">SYNC</button>
            </div>

            <!-- Text & Fonts -->
            <div id="tab-font" class="control-tab active">
                <div class="input-group">
                    <label class="inspector-label">Font Family</label>
                    <select id="fontFamilySelect" onchange="updateStyles()">
                        <option value="'Kantumruy Pro', sans-serif">Kantumruy Pro</option>
                    </select>
                    <label class="inspector-label mt-2">Format</label>
                    <div class="grid grid-cols-4 gap-1">
                        <button onclick="toggleFont('bold')" class="bg-slate-800 p-1 text-[8px] rounded font-bold">B</button>
                        <button onclick="toggleFont('italic')" class="bg-slate-800 p-1 text-[8px] rounded italic">I</button>
                        <button onclick="toggleFont('underline')" class="bg-slate-800 p-1 text-[8px] rounded underline">U</button>
                        <button onclick="toggleFont('line-through')" class="bg-slate-800 p-1 text-[8px] rounded line-through">S</button>
                    </div>
                    <label class="inspector-label mt-2">Size: <span id="v-fontSize">60</span>px</label>
                    <input type="range" id="fontSize" min="10" max="400" value="60" oninput="updateStyles()">
                    <label class="inspector-label mt-2">Spacing</label>
                    <div class="grid-2">
                        <div><span class="text-[7px]">Character</span><input type="range" id="charSpacing" min="-10" max="50" value="4" oninput="updateStyles()"></div>
                        <div><span class="text-[7px]">Line</span><input type="range" id="lineHeight" min="0.5" max="3" step="0.1" value="1.2" oninput="updateStyles()"></div>
                    </div>
                </div>
                <div class="input-group">
                    <label class="inspector-label">Alignment</label>
                    <div class="grid grid-cols-3 gap-1">
                        <button onclick="setTextAlign('left')" class="bg-slate-800 p-1 text-[8px] rounded">LEFT</button>
                        <button onclick="setTextAlign('center')" class="bg-slate-800 p-1 text-[8px] rounded">CENTER</button>
                        <button onclick="setTextAlign('right')" class="bg-slate-800 p-1 text-[8px] rounded">RIGHT</button>
                    </div>
                </div>
            </div>

            <!-- Visual Styles -->
            <div id="tab-style" class="control-tab">
                <div class="input-group">
                    <label class="inspector-label">Colors</label>
                    <div class="grid grid-cols-2 gap-2">
                        <div><label class="text-[7px]">Primary</label><input type="color" id="primaryColor" value="#ffffff" oninput="updateStyles()"></div>
                        <div><label class="text-[7px]">Active</label><input type="color" id="secondaryColor" value="#fbbf24" oninput="updateStyles()"></div>
                    </div>
                </div>
                <div class="input-group">
                    <label class="inspector-label">Stroke (Outline)</label>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="color" id="strokeColor" value="#000000" oninput="updateStyles()">
                        <input type="range" id="strokeWidth" min="0" max="25" value="2" oninput="updateStyles()">
                    </div>
                </div>
                <div class="input-group">
                    <label class="inspector-label">Shadow</label>
                    <div><label class="text-[7px]">Color</label><input type="color" id="shadowColor" value="#000000" oninput="updateStyles()"></div>
                    <div class="grid-2">
                        <div><label class="text-[7px]">X-Offset</label><input type="range" id="shadowX" min="-50" max="50" value="2" oninput="updateStyles()"></div>
                        <div><label class="text-[7px]">Y-Offset</label><input type="range" id="shadowY" min="-50" max="50" value="2" oninput="updateStyles()"></div>
                    </div>
                    <div><label class="text-[7px]">Blur</label><input type="range" id="shadowBlur" min="0" max="50" value="4" oninput="updateStyles()"></div>
                </div>
            </div>

            <!-- Layout & Miscellaneous -->
            <div id="tab-layout" class="control-tab">
                <div class="input-group">
                    <label class="inspector-label">Position X-Y</label>
                    <div class="grid-2">
                        <input type="range" id="posX" min="-1000" max="1000" value="0" oninput="updateStyles()">
                        <input type="range" id="posY" min="-1000" max="1000" value="200" oninput="updateStyles()">
                    </div>
                </div>
                <div class="input-group">
                    <label class="inspector-label">Scale & Rotation</label>
                    <div class="grid grid-cols-2 gap-2">
                        <div><label class="text-[7px]">Scale X</label><input type="range" id="scaleX" min="0.1" max="5" step="0.1" value="1" oninput="updateStyles()"></div>
                        <div><label class="text-[7px]">Scale Y</label><input type="range" id="scaleY" min="0.1" max="5" step="0.1" value="1" oninput="updateStyles()"></div>
                    </div>
                    <label class="text-[7px] mt-2 block">Rotation</label>
                    <input type="range" id="rotation" min="-180" max="180" value="0" oninput="updateStyles()">
                </div>
            </div>

            <!-- Opaque Box -->
            <div id="tab-box" class="control-tab">
                <div class="input-group">
                    <div class="flex justify-between items-center mb-2">
                        <label class="inspector-label m-0">Box Background</label>
                        <label class="switch">
                            <input type="checkbox" id="showBox" checked onchange="updateStyles()">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="grid-2">
                        <input type="color" id="boxBgColor" value="#000000" oninput="updateStyles()">
                        <div>
                            <label class="text-[7px] block">Opacity</label>
                            <input type="range" id="boxOpacity" min="0" max="1" step="0.01" value="0.5" oninput="updateStyles()">
                        </div>
                    </div>
                    <div class="grid-2 mt-2">
                        <div><label class="text-[7px]">Rounded</label><input type="range" id="boxRounded" min="0" max="100" value="0" oninput="updateStyles()"></div>
                        <div><label class="text-[7px]">Width</label><input type="range" id="boxWidth" min="0" max="2000" value="0" oninput="updateStyles()"></div>
                    </div>
                    <div class="grid-2 mt-2">
                        <div><label class="text-[7px]">Offset X</label><input type="range" id="boxOffsetX" min="-500" max="500" value="0" oninput="updateStyles()"></div>
                        <div><label class="text-[7px]">Offset Y</label><input type="range" id="boxOffsetY" min="-500" max="500" value="0" oninput="updateStyles()"></div>
                    </div>
                </div>
            </div>

            <!-- Image Adjustment -->
            <div id="tab-adj" class="control-tab">
                <div class="input-group">
                    <div class="flex justify-between items-center mb-2">
                        <label class="inspector-label m-0">Zoom Transition</label>
                        <label class="switch">
                            <input type="checkbox" id="enableBgZoom" onchange="updateStyles()">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="grid-2">
                        <div>
                            <label class="text-[7px] block">Duration (s)</label>
                            <input type="range" id="bgZoomDuration" min="1" max="60" step="1" value="20" oninput="updateStyles()">
                        </div>
                        <div>
                            <label class="text-[7px] block">Scale Max</label>
                            <input type="range" id="bgZoomMax" min="1" max="2" step="0.05" value="1.2" oninput="updateStyles()">
                        </div>
                    </div>
                </div>
                <div class="input-group">
                    <label class="inspector-label">Basic Color</label>
                    <div><label class="text-[7px]">Brightness</label><input type="range" id="adjBrightness" min="0" max="3" step="0.05" value="1" oninput="inputAdjust()"></div>
                    <div><label class="text-[7px]">Contrast</label><input type="range" id="adjContrast" min="0" max="3" step="0.05" value="1" oninput="inputAdjust()"></div>
                    <div><label class="text-[7px]">Saturation</label><input type="range" id="adjSaturate" min="0" max="3" step="0.05" value="1" oninput="inputAdjust()"></div>
                </div>
                <div class="input-group">
                    <label class="inspector-label">Advanced</label>
                    <div><label class="text-[7px]">Hue Rotate</label><input type="range" id="adjHue" min="0" max="360" value="0" oninput="inputAdjust()"></div>
                    <div><label class="text-[7px]">Blur</label><input type="range" id="adjBlur" min="0" max="50" value="0" oninput="inputAdjust()"></div>
                    <div><label class="text-[7px]">Vignette</label><input type="range" id="vignetteOpacity" min="0" max="1" step="0.05" value="0.5" oninput="inputAdjust()"></div>
                </div>
            </div>

            <!-- Logo -->
            <div id="tab-logo" class="control-tab">
                <div class="input-group">
                    <label class="inspector-label">Logo Control</label>
                    <div><label class="text-[7px]">Size</label><input type="range" id="logoWidth" min="10" max="1000" value="150" oninput="updateStyles()"></div>
                    <div><label class="text-[7px]">Opacity</label><input type="range" id="logoOpacity" min="0" max="1" step="0.1" value="1" oninput="updateStyles()"></div>
                    <div class="grid-2 mt-2">
                        <div><label class="text-[7px]">Pos X</label><input type="range" id="logoX" min="0" max="1920" value="50" oninput="updateStyles()"></div>
                        <div><label class="text-[7px]">Pos Y</label><input type="range" id="logoY" min="0" max="1080" value="50" oninput="updateStyles()"></div>
                    </div>
                </div>
            </div>

            <div id="tab-sync" class="control-tab">
                <table class="w-full text-[9px]">
                    <tbody id="syncTableBody"></tbody>
                </table>
            </div>
        </aside>
    </main>

    <script>
        const apiKey = ""; 
        let allLines = [];
        let editingLineId = null;
        let wavesurfer;
        let textAlign = 'center';
        let fontStyle = 'normal';
        let fontBold = '700';
        let fontDecoration = 'none';

        window.onload = () => {
            wavesurfer = WaveSurfer.create({
                container: '#waveform',
                waveColor: '#1e293b',
                progressColor: '#3b82f6',
                cursorColor: '#ffffff',
                height: 100,
                barWidth: 2,
                normalize: true
            });

            wavesurfer.on('audioprocess', updateUI);
            wavesurfer.on('seek', updateUI);
            wavesurfer.on('ready', () => {
                document.getElementById('durationDisp').innerText = formatTime(wavesurfer.getDuration());
            });

            document.getElementById('audioInput').onchange = e => {
                const file = e.target.files[0];
                if(file) wavesurfer.load(URL.createObjectURL(file));
            };

            document.getElementById('bgInput').onchange = e => {
                const file = e.target.files[0];
                if(file) {
                    const url = URL.createObjectURL(file);
                    document.getElementById('canvasContainer').style.setProperty('--bg-image', `url(${url})`);
                }
            };

            document.getElementById('logoInput').onchange = e => {
                const file = e.target.files[0];
                if(file) {
                    const logo = document.getElementById('logoOverlay');
                    logo.src = URL.createObjectURL(file);
                    logo.classList.remove('hidden');
                }
            };

            updateCanvasSize();
            updateStyles();
        };

        function handleFontUpload(input) {
            const file = input.files[0];
            if (!file) return;
            const fontName = file.name.split('.')[0].replace(/\s/g, '_');
            const reader = new FileReader();
            reader.onload = e => {
                const newFont = new FontFace(fontName, e.target.result);
                newFont.load().then(f => {
                    document.fonts.add(f);
                    const sel = document.getElementById('fontFamilySelect');
                    const opt = document.createElement('option');
                    opt.value = fontName; opt.textContent = file.name; opt.selected = true;
                    sel.appendChild(opt);
                    updateStyles();
                });
            };
            reader.readAsArrayBuffer(file);
        }

        function setTextAlign(val) { textAlign = val; updateStyles(); }

        function toggleFont(type) {
            if(type === 'bold') fontBold = fontBold === '700' ? '400' : '700';
            if(type === 'italic') fontStyle = fontStyle === 'italic' ? 'normal' : 'italic';
            if(type === 'underline') fontDecoration = fontDecoration === 'underline' ? 'none' : 'underline';
            if(type === 'line-through') fontDecoration = fontDecoration === 'line-through' ? 'none' : 'line-through';
            updateStyles();
        }

        function addLineUnified() {
            const textarea = document.getElementById('newLineInput');
            const content = textarea.value.trim();
            if (!content) return;
            const lines = content.split(/\n/);
            const syllables = [];
            lines.forEach((lText, idx) => {
                lText.trim().split(/\s+/).forEach(word => {
                    syllables.push({ text: word, time: null, lineIdx: idx });
                });
            });
            const lineId = Date.now();
            allLines.push({ 
                id: lineId, 
                title: content.substring(0, 15) + "...", 
                syllables, 
                startTime: wavesurfer.getCurrentTime(), 
                endTime: wavesurfer.getCurrentTime() + 5, 
                maxLines: lines.length 
            });
            textarea.value = '';
            renderLineList();
            selectEditingLine(lineId);
        }

        function renderLineList() {
            const container = document.getElementById('lineList');
            container.innerHTML = '';
            allLines.forEach(line => {
                const div = document.createElement('div');
                div.className = `p-2 rounded border border-slate-800 cursor-pointer text-[9px] ${line.id === editingLineId ? 'bg-blue-600' : 'bg-slate-800'}`;
                div.innerHTML = `
                    <div class="flex justify-between font-bold"><span>${line.title}</span><button onclick="removeLine(event, ${line.id})">×</button></div>
                    <div class="flex justify-between mt-1 text-[7px] text-slate-300">
                        <span>IN: ${formatTime(line.startTime)}</span>
                        <span>OUT: ${formatTime(line.endTime)}</span>
                    </div>
                    <div class="grid grid-cols-2 gap-1 mt-1">
                        <button onclick="setLineTime(event, ${line.id}, 'start')" class="bg-black/30 py-1 rounded">SET IN</button>
                        <button onclick="setLineTime(event, ${line.id}, 'end')" class="bg-black/30 py-1 rounded">SET OUT</button>
                    </div>`;
                div.onclick = () => selectEditingLine(line.id);
                container.appendChild(div);
            });
        }

        function setLineTime(e, id, type) {
            e.stopPropagation();
            const line = allLines.find(l => l.id === id);
            if(line) {
                if(type === 'start') line.startTime = wavesurfer.getCurrentTime();
                else line.endTime = wavesurfer.getCurrentTime();
                renderLineList();
                updateUI();
            }
        }

        function selectEditingLine(id) { editingLineId = id; renderLineList(); renderTable(); updateUI(); }
        function removeLine(e, id) { e.stopPropagation(); allLines = allLines.filter(l => l.id !== id); renderLineList(); }

        function renderTable() {
            const body = document.getElementById('syncTableBody');
            body.innerHTML = '';
            const line = allLines.find(l => l.id === editingLineId);
            if (!line) return;
            line.syllables.forEach((s) => {
                const row = document.createElement('tr');
                row.className = 'border-b border-slate-900 cursor-pointer hover:bg-slate-800';
                row.innerHTML = `<td class="p-2 text-white">${s.text}</td><td class="p-2 text-right font-mono text-blue-400">${s.time ? s.time.toFixed(2) : '--'}</td>`;
                row.onclick = () => { s.time = wavesurfer.getCurrentTime(); renderTable(); updateUI(); };
                body.appendChild(row);
            });
        }

        function seekAudio(e) {
            const rect = e.currentTarget.getBoundingClientRect();
            wavesurfer.seekTo((e.clientX - rect.left) / rect.width);
        }

        function updateUI() {
            const currentTime = wavesurfer.getCurrentTime();
            document.getElementById('currentTimeDisp').innerText = formatTime(currentTime);
            document.getElementById('timeline-progress').style.width = (currentTime / wavesurfer.getDuration() * 100) + '%';

            const container = document.getElementById('previewText');
            let activeLine = allLines.find(l => currentTime >= l.startTime && currentTime <= l.endTime);

            if (!activeLine) { 
                container.innerHTML = ''; 
                return; 
            }

            container.innerHTML = '';
            const box = document.createElement('div');
            box.className = 'opaque-box';
            for (let i = 0; i < activeLine.maxLines; i++) {
                const lineDiv = document.createElement('div');
                lineDiv.className = 'line-block';
                activeLine.syllables.filter(s => s.lineIdx === i).forEach(s => {
                    const span = document.createElement('span');
                    span.innerText = s.text + ' ';
                    const isActive = s.time !== null && currentTime >= s.time;
                    span.className = `syllable-item ${isActive ? 'active-syllable' : ''}`;
                    lineDiv.appendChild(span);
                });
                box.appendChild(lineDiv);
            }
            container.appendChild(box);
        }

        function hexToRgba(hex, opacity) {
            let r = 0, g = 0, b = 0;
            if (hex.length == 4) {
                r = parseInt(hex[1] + hex[1], 16);
                g = parseInt(hex[2] + hex[2], 16);
                b = parseInt(hex[3] + hex[3], 16);
            } else if (hex.length == 7) {
                r = parseInt(hex.substring(1, 3), 16);
                g = parseInt(hex.substring(3, 5), 16);
                b = parseInt(hex.substring(5, 7), 16);
            }
            return `rgba(${r}, ${g}, ${b}, ${opacity})`;
        }

        function inputAdjust() {
            const r = document.documentElement;
            const v = (id) => document.getElementById(id).value;
            r.style.setProperty('--adj-brightness', v('adjBrightness'));
            r.style.setProperty('--adj-contrast', v('adjContrast'));
            r.style.setProperty('--adj-saturate', v('adjSaturate'));
            r.style.setProperty('--adj-hue', v('adjHue') + 'deg');
            r.style.setProperty('--adj-blur', v('adjBlur') + 'px');
            r.style.setProperty('--vignette-opacity', v('vignetteOpacity'));
        }

        function updateStyles() {
            const r = document.documentElement;
            const v = (id) => document.getElementById(id).value;
            const isChecked = (id) => document.getElementById(id).checked;
            
            r.style.setProperty('--active-font-family', v('fontFamilySelect'));
            r.style.setProperty('--font-size', v('fontSize') + 'px');
            r.style.setProperty('--font-bold', fontBold);
            r.style.setProperty('--font-style', fontStyle);
            r.style.setProperty('--font-decoration', fontDecoration);
            r.style.setProperty('--char-spacing', v('charSpacing') + 'px');
            r.style.setProperty('--line-height', v('lineHeight'));
            r.style.setProperty('--primary-color', v('primaryColor'));
            r.style.setProperty('--secondary-color', v('secondaryColor'));
            r.style.setProperty('--stroke-width', v('strokeWidth') + 'px');
            r.style.setProperty('--stroke-color', v('strokeColor'));
            r.style.setProperty('--shadow-dist-x', v('shadowX') + 'px');
            r.style.setProperty('--shadow-dist-y', v('shadowY') + 'px');
            r.style.setProperty('--shadow-blur', v('shadowBlur') + 'px');
            r.style.setProperty('--shadow-color', v('shadowColor'));
            r.style.setProperty('--pos-x', v('posX') + 'px');
            r.style.setProperty('--pos-y', v('posY') + 'px');
            r.style.setProperty('--scale-x', v('scaleX'));
            r.style.setProperty('--scale-y', v('scaleY'));
            r.style.setProperty('--rotation', v('rotation') + 'deg');
            
            // Box logic
            const boxColor = v('boxBgColor');
            const boxOpacity = v('boxOpacity');
            r.style.setProperty('--box-bg-color', hexToRgba(boxColor, boxOpacity));
            r.style.setProperty('--box-show', isChecked('showBox') ? '1' : '0');
            r.style.setProperty('--box-rounded', v('boxRounded') + 'px');
            r.style.setProperty('--box-width', v('boxWidth') === "0" ? 'auto' : v('boxWidth') + 'px');
            r.style.setProperty('--box-offset-x', v('boxOffsetX') + 'px');
            r.style.setProperty('--box-offset-y', v('boxOffsetY') + 'px');
            
            // Background Zoom logic
            if (isChecked('enableBgZoom')) {
                r.style.setProperty('--bg-animation', `bgZoomInOut ${v('bgZoomDuration')}s ease-in-out infinite`);
                r.style.setProperty('--bg-zoom-max', v('bgZoomMax'));
            } else {
                r.style.setProperty('--bg-animation', 'none');
            }

            // Other
            r.style.setProperty('--logo-width', v('logoWidth') + 'px');
            r.style.setProperty('--logo-opacity', v('logoOpacity'));
            r.style.setProperty('--logo-x', v('logoX') + 'px');
            r.style.setProperty('--logo-y', v('logoY') + 'px');

            document.getElementById('previewText').dataset.align = textAlign;
            document.getElementById('v-fontSize').innerText = v('fontSize');
            inputAdjust();
            updateUI();
        }

        function showTab(id) {
            document.querySelectorAll('.control-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function formatTime(s) {
            if (isNaN(s)) return "00:00.00";
            const m = Math.floor(s / 60);
            const sec = (s % 60).toFixed(2);
            return `${m.toString().padStart(2,'0')}:${sec.padStart(5,'0')}`;
        }

        function updateCanvasSize() {
            const w = 1920, h = 1080;
            const area = document.getElementById('previewArea');
            const ratio = Math.min((area.clientWidth-40)/w, (area.clientHeight-40)/h);
            const canvas = document.getElementById('canvasContainer');
            canvas.style.width = (w * ratio) + 'px';
            canvas.style.height = (h * ratio) + 'px';
        }

        function exportData() {
            const blob = new Blob([JSON.stringify({ lines: allLines }, null, 2)], {type: 'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'karaoke.json'; a.click();
        }

        async function generateTTS() {
            const text = document.getElementById('newLineInput').value.trim();
            if(!text) return;
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Say: ${text}` }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                        }
                    })
                });
                const result = await response.json();
                const audioData = result.candidates[0].content.parts[0].inlineData.data;
                wavesurfer.load(URL.createObjectURL(pcmToWavBlob(audioData, 24000)));
                addLineUnified();
            } catch (e) { console.error(e); }
        }

        function pcmToWavBlob(base64, sampleRate) {
            const buffer = Uint8Array.from(atob(base64), c => c.charCodeAt(0)).buffer;
            const wavHeader = new ArrayBuffer(44);
            const view = new DataView(wavHeader);
            view.setUint32(0, 0x52494646, false); view.setUint32(4, 36 + buffer.byteLength, true);
            view.setUint32(8, 0x57415645, false); view.setUint32(12, 0x666d7420, false);
            view.setUint32(16, 16, true); view.setUint16(20, 1, true);
            view.setUint16(22, 1, true); view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true); view.setUint16(32, 2, true);
            view.setUint16(34, 16, true); view.setUint32(36, 0x64617461, false);
            view.setUint32(40, buffer.byteLength, true);
            return new Blob([wavHeader, buffer], { type: 'audio/wav' });
        }
        
        window.addEventListener('resize', updateCanvasSize);
    </script>
