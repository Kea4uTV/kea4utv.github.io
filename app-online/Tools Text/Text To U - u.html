<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Replacer Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kantumruy Pro', sans-serif;
            background-color: #f3f4f6;
        }
        .container-custom {
            max-width: 800px;
            margin: 2rem auto;
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="container-custom">
    <h1 class="text-3xl font-bold text-center text-blue-600 mb-6">ឧបករណ៍ជំនួសអត្ថបទ</h1>
    
    <div class="mb-4">
        <label class="block text-gray-700 font-semibold mb-2">បញ្ចូលអត្ថបទរបស់អ្នកនៅទីនេះ៖</label>
        <textarea id="inputText" rows="8" class="w-full p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition" placeholder="វាយអត្ថបទរបស់អ្នកនៅទីនេះ..."></textarea>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
        <div>
            <label class="block text-gray-700 font-semibold mb-2">អក្សរដែលចង់ប្ដូរ (Find):</label>
            <input type="text" id="findText" class="w-full p-3 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" placeholder="ឧទាហរណ៍: U">
        </div>
        <div>
            <label class="block text-gray-700 font-semibold mb-2">ជំនួសដោយ (Replace with):</label>
            <input type="text" id="replaceText" class="w-full p-3 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" placeholder="ឧទាហរណ៍: u">
        </div>
    </div>

    <div class="flex flex-wrap gap-3 mb-6">
        <button onclick="replaceText()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition transform active:scale-95 shadow-md">
            ប្ដូរអត្ថបទទាំងអស់
        </button>
        <button onclick="clearAll()" class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-3 px-6 rounded-lg transition transform active:scale-95 shadow-md">
            សម្អាត
        </button>
        <button onclick="copyResult()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-lg transition transform active:scale-95 shadow-md">
            ចម្លងអត្ថបទលទ្ធផល (Copy)
        </button>
    </div>

    <div id="statusMessage" class="hidden mb-4 p-3 rounded-lg text-center font-medium"></div>

    <div>
        <label class="block text-gray-700 font-semibold mb-2">លទ្ធផល៖</label>
        <textarea id="outputText" rows="8" class="w-full p-4 border border-gray-300 rounded-lg bg-gray-50 outline-none" readonly placeholder="លទ្ធផលនឹងបង្ហាញនៅទីនេះ..."></textarea>
    </div>

    <div class="mt-4 text-sm text-gray-500 italic text-right">
        * ចំណាំ៖ វានឹងប្ដូររាល់តួអក្សរដែលដូចគ្នាទាំងអស់នៅក្នុងអត្ថបទ។
    </div>
</div>

<script>
    function replaceText() {
        const input = document.getElementById('inputText').value;
        const find = document.getElementById('findText').value;
        const replace = document.getElementById('replaceText').value;
        
        if (!find) {
            showStatus('សូមបញ្ចូលអក្សរដែលអ្នកចង់ប្ដូរ!', 'bg-red-100 text-red-700');
            return;
        }

        // ការប្រើ Regular Expression ជាមួយ flag 'g' ដើម្បីប្ដូរទាំងអស់ (Global replace)
        // បើចង់ឱ្យវាគិត Case Sensitive ឬអត់ អាចថែម 'gi' (i = case insensitive)
        const escapedFind = find.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); // ការពារកុំឱ្យ Error ជាមួយ special characters
        const regex = new RegExp(escapedFind, 'g');
        const result = input.replace(regex, replace);
        
        document.getElementById('outputText').value = result;
        showStatus('បានប្ដូរដោយជោគជ័យ!', 'bg-green-100 text-green-700');
    }

    function clearAll() {
        document.getElementById('inputText').value = '';
        document.getElementById('findText').value = '';
        document.getElementById('replaceText').value = '';
        document.getElementById('outputText').value = '';
        hideStatus();
    }

    function copyResult() {
        const output = document.getElementById('outputText');
        if (!output.value) {
            showStatus('គ្មានអត្ថបទសម្រាប់ចម្លងទេ!', 'bg-yellow-100 text-yellow-700');
            return;
        }
        
        output.select();
        document.execCommand('copy');
        showStatus('បានចម្លងទៅកាន់ Clipboard!', 'bg-blue-100 text-blue-700');
    }

    function showStatus(msg, classes) {
        const status = document.getElementById('statusMessage');
        status.innerText = msg;
        status.className = `p-3 rounded-lg text-center font-medium ${classes}`;
        status.classList.remove('hidden');
        
        setTimeout(() => {
            hideStatus();
        }, 3000);
    }

    function hideStatus() {
        document.getElementById('statusMessage').classList.add('hidden');
    }
</script>

</body>
</html>
