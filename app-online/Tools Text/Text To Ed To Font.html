<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Text & Font Editor - Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kantumruy Pro', sans-serif;
            background-color: #f3f4f6;
        }
        .main-container {
            max-width: 1300px;
            margin: 0 auto;
        }
        /* កំណត់ទំហំអក្សរលំនាំដើមឱ្យធំ និងអាចកែប្រែបាន */
        .dynamic-font {
            font-size: 20px;
            line-height: 1.6;
        }
        .editor-box {
            min-height: 450px;
            height: 100%;
        }
        @media (min-width: 768px) {
            .editor-box {
                height: calc(100vh - 420px);
            }
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body class="p-4 md:p-6">

<div class="main-container">
    <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
        <h1 class="text-2xl md:text-3xl font-bold text-blue-600">ឧបករណ៍កែសម្រួលអត្ថបទ និង Font</h1>
        
        <!-- ឧបករណ៍បញ្ជាទំហំអក្សរ -->
        <div class="bg-white px-4 py-2 rounded-lg shadow-sm border border-gray-200 flex items-center gap-3">
            <span class="text-sm font-semibold text-gray-600">ទំហំអក្សរ:</span>
            <input type="range" id="fontSizeSlider" min="14" max="50" value="20" class="w-32 cursor-pointer">
            <span id="fontSizeValue" class="text-blue-600 font-bold min-w-[30px]">20px</span>
        </div>
    </div>

    <!-- ផ្នែក Upload Fonts -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6 p-4 bg-blue-50 rounded-xl border border-blue-100 shadow-inner">
        <div class="space-y-2">
            <label class="block text-blue-800 font-bold text-sm flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
                Font សម្រាប់ Editor
            </label>
            <input type="file" id="fontEditorFile" accept=".ttf,.otf,.woff,.woff2" class="block w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200 cursor-pointer">
            <p class="text-[10px] text-blue-600 truncate" id="editorFontName">Font: Default</p>
        </div>
        <div class="space-y-2 border-t md:border-t-0 md:border-l border-blue-200 pt-4 md:pt-0 md:pl-4">
            <label class="block text-indigo-800 font-bold text-sm flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
                Font សម្រាប់លទ្ធផល
            </label>
            <input type="file" id="fontOutputFile" accept=".ttf,.otf,.woff,.woff2" class="block w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-indigo-100 file:text-indigo-700 hover:file:bg-indigo-200 cursor-pointer">
            <p class="text-[10px] text-indigo-600 truncate" id="outputFontName">Font: Default</p>
        </div>
    </div>

    <!-- Split Screen Layout -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
        <div class="flex flex-col">
            <label class="block text-gray-700 font-bold mb-2 text-sm uppercase tracking-wider">កន្លែងសរសេរអត្ថបទ (Editor)</label>
            <textarea id="inputText" class="editor-box dynamic-font w-full p-6 border border-gray-300 rounded-xl focus:ring-4 focus:ring-blue-100 outline-none transition resize-none shadow-sm" placeholder="វាយអត្ថបទរបស់អ្នកនៅទីនេះ..."></textarea>
        </div>
        
        <div class="flex flex-col">
            <label class="block text-gray-700 font-bold mb-2 text-sm uppercase tracking-wider">លទ្ធផលបង្ហាញភ្លាមៗ (Preview)</label>
            <div id="outputText" class="editor-box dynamic-font w-full p-6 border border-gray-300 rounded-xl bg-white overflow-auto whitespace-pre-wrap shadow-sm border-dashed" style="background-image: radial-gradient(#cbd5e1 0.5px, transparent 0.5px); background-size: 24px 24px;"></div>
        </div>
    </div>

    <!-- Controls -->
    <div class="bg-white p-5 rounded-2xl shadow-lg border border-gray-100">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 items-center">
            <div class="lg:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-3">
                <div class="relative">
                    <span class="absolute inset-y-0 left-3 flex items-center text-gray-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd" /></svg>
                    </span>
                    <input type="text" id="findText" class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all" placeholder="ស្វែងរកអក្សរ...">
                </div>
                <div class="relative">
                    <span class="absolute inset-y-0 left-3 flex items-center text-gray-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z" clip-rule="evenodd" /></svg>
                    </span>
                    <input type="text" id="replaceText" class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all" placeholder="ជំនួសដោយ...">
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="doubleSpace()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition transform active:scale-95 shadow-md flex items-center justify-center gap-2">
                    Space (1->2)
                </button>
                <button onclick="copyResult()" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl transition transform active:scale-95 shadow-md">
                    ចម្លងលទ្ធផល
                </button>
                <button onclick="clearAll()" class="p-3 bg-red-50 text-red-600 hover:bg-red-100 rounded-xl transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                </button>
            </div>
        </div>
    </div>

    <div id="statusMessage" class="hidden fixed bottom-10 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full shadow-2xl text-center font-bold text-sm z-50 transition-all"></div>
</div>

<script>
    const inputText = document.getElementById('inputText');
    const outputText = document.getElementById('outputText');
    const findInput = document.getElementById('findText');
    const replaceInput = document.getElementById('replaceText');
    const fontSizeSlider = document.getElementById('fontSizeSlider');
    const fontSizeValue = document.getElementById('fontSizeValue');

    // Control Font Size
    fontSizeSlider.addEventListener('input', (e) => {
        const size = e.target.value + 'px';
        inputText.style.fontSize = size;
        outputText.style.fontSize = size;
        fontSizeValue.innerText = size;
    });

    // Handle Font Upload
    function handleFontUpload(inputElement, fontFaceName, targetElement, statusLabel) {
        inputElement.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const fontData = event.target.result;
                const newFontFace = new FontFace(fontFaceName, fontData);
                
                newFontFace.load().then(function(loadedFace) {
                    document.fonts.add(loadedFace);
                    targetElement.style.fontFamily = fontFaceName;
                    statusLabel.innerText = "Font: " + file.name;
                    showStatus('បានដាក់ Font ថ្មីជោគជ័យ!', 'bg-green-600 text-white');
                }).catch(function(error) {
                    showStatus('ការដាក់ Font មានបញ្ហា!', 'bg-red-600 text-white');
                });
            };
            reader.readAsArrayBuffer(file);
        });
    }

    handleFontUpload(document.getElementById('fontEditorFile'), 'CustomEditorFont', inputText, document.getElementById('editorFontName'));
    handleFontUpload(document.getElementById('fontOutputFile'), 'CustomOutputFont', outputText, document.getElementById('outputFontName'));

    // Process Text Real-time
    function processText() {
        let text = inputText.value;
        const find = findInput.value;
        const replace = replaceInput.value;

        if (find) {
            try {
                const escapedFind = find.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const regex = new RegExp(escapedFind, 'g');
                text = text.replace(regex, replace);
            } catch(e) {}
        }
        outputText.innerText = text;
    }

    inputText.addEventListener('input', processText);
    findInput.addEventListener('input', processText);
    replaceInput.addEventListener('input', processText);

    function doubleSpace() {
        if (!inputText.value) return;
        inputText.value = inputText.value.replace(/ /g, '  ');
        processText();
        showStatus('បានបន្ថែម Space រួចរាល់!', 'bg-indigo-600 text-white');
    }

    function clearAll() {
        if(!confirm('តើអ្នកពិតជាចង់សម្អាតមែនទេ?')) return;
        inputText.value = '';
        findInput.value = '';
        replaceInput.value = '';
        processText();
        hideStatus();
    }

    function copyResult() {
        const text = outputText.innerText;
        if (!text) {
            showStatus('គ្មានអត្ថបទសម្រាប់ចម្លងទេ!', 'bg-yellow-500 text-white');
            return;
        }
        
        const tempTextArea = document.createElement("textarea");
        tempTextArea.value = text;
        document.body.appendChild(tempTextArea);
        tempTextArea.select();
        document.execCommand('copy');
        document.body.removeChild(tempTextArea);
        showStatus('បានចម្លងអត្ថបទរួចរាល់!', 'bg-green-600 text-white');
    }

    function showStatus(msg, classes) {
        const status = document.getElementById('statusMessage');
        status.innerText = msg;
        status.className = `fixed bottom-10 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full shadow-2xl text-center font-bold text-sm z-50 transition-all ${classes}`;
        status.classList.remove('hidden');
        setTimeout(hideStatus, 3000);
    }

    function hideStatus() {
        document.getElementById('statusMessage').classList.add('hidden');
    }
</script>

</body>
</html>
