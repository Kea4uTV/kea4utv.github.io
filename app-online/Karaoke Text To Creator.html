<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ខ្ញុំ គួន សុគា លេខទូរស័ព្ទ ០៨១៥០៣៣៣០</title>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com/"></script>
    <script src="https://unpkg.com/wavesurfer.js"></script>
    <style>
        :root { --custom-font: 'Kantumruy Pro', sans-serif; }
        body { font-family: 'Kantumruy Pro', sans-serif; background-color: #020617; color: #f8fafc; overflow: hidden; }
        
        #previewArea {
            position: relative;
            background-color: #000;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 20px;
        }

        #canvasContainer {
            position: relative;
            background-color: var(--canvas-bg-color, #000000);
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            overflow: hidden;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: default;
            filter: brightness(var(--adj-brightness, 1)) 
                    contrast(var(--adj-contrast, 1)) 
                    saturate(var(--adj-saturate, 1)) 
                    hue-rotate(var(--adj-hue, 0deg))
                    blur(var(--adj-blur, 0px))
                    sepia(var(--adj-sepia, 0));
        }

        #bgMediaContainer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
            /* Support for Tile and Center */
            background-repeat: var(--bg-repeat, no-repeat);
            background-position: var(--bg-position, center);
            background-size: var(--bg-size, cover);
        }
        
        /* Apply dynamic object-fit for Img and Vid */
        #bgImageElement, #bgVideoElement {
            width: 100%; height: 100%;
            object-fit: var(--bg-object-fit, cover);
            object-position: var(--bg-position, center);
            display: none;
            animation: var(--bg-animation, none);
        }

        /* Tile specific styling */
        .bg-tile-mode #bgImageElement {
            width: auto;
            height: auto;
            object-fit: none;
        }

        @keyframes bgZoomInOut {
            0% { transform: scale(1); }
            50% { transform: scale(var(--bg-zoom-max, 1.2)); }
            100% { transform: scale(1); }
        }

        #vignette {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 12;
            background: radial-gradient(circle, transparent 50%, rgba(0,0,0,var(--vignette-opacity, 0)) 100%);
        }

        #logoOverlay {
            position: absolute;
            z-index: 50;
            width: var(--logo-width, 100px);
            top: var(--logo-y, 20px);
            left: var(--logo-x, 20px);
            opacity: var(--logo-opacity, 1);
            pointer-events: none;
        }

        .dynamic-overlay {
            position: absolute;
            z-index: 40;
            cursor: move;
            user-select: none;
            transition: outline 0.1s ease;
        }
        .dynamic-overlay.selected {
            outline: 2px solid #3b82f6;
            outline-offset: 2px;
        }

        #previewTextContainer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 999;
            pointer-events: none;
        }
        
        .preview-text-element {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 90%;
            display: flex;
            flex-direction: column;
            pointer-events: auto;
            cursor: grab;
        }

        .preview-text-element:active {
            cursor: grabbing;
        }

        .preview-text-element[data-align="left"] { align-items: flex-start; text-align: left; }
        .preview-text-element[data-align="center"] { align-items: center; text-align: center; }
        .preview-text-element[data-align="right"] { align-items: flex-end; text-align: right; }

        .line-block { display: block; width: 100%; text-align: inherit; }

        .syllable-item {
            display: inline-block;
            position: relative;
            color: var(--individual-color, var(--primary-color, #ffffff));
            font-size: var(--individual-size, var(--font-size, 60px));
            font-weight: var(--font-bold, 700);
            font-style: var(--font-style, normal);
            text-decoration: var(--font-decoration, none);
            font-family: var(--individual-font, var(--active-font-family, 'Kantumruy Pro', sans-serif));
            margin: 0 var(--char-spacing, 0px);
            line-height: var(--line-height, 1.2);
            transform: scale(var(--scale-x, 1), var(--scale-y, 1));
            
            -webkit-text-stroke: var(--stroke-width, 2px) var(--stroke-color, #000000);
            paint-order: var(--stroke-order, stroke fill);
            stroke-linejoin: var(--stroke-join, round);
            -webkit-text-stroke-linejoin: var(--stroke-join, round);
            
            filter: drop-shadow(var(--shadow-dist-x, 2px) var(--shadow-dist-y, 2px) var(--shadow-blur, 4px) var(--shadow-color, rgba(0,0,0,0.8)));
            transition: color 0.1s linear, font-size 0.2s ease;
            white-space: pre;
        }

        .active-syllable { color: var(--secondary-color, #fbbf24) !important; }

        .opaque-box {
            background-color: var(--box-bg-color, transparent);
            border-radius: var(--box-rounded, 0px);
            padding: var(--box-padding-y, 10px) var(--box-padding-x, 20px);
            display: flex;
            flex-direction: column;
            width: var(--box-width, auto);
            height: var(--box-height, auto);
            opacity: var(--box-show, 1);
            transform: translate(var(--box-offset-x, 0px), var(--box-offset-y, 0px));
        }

        .control-tab { display: none; height: calc(100vh - 160px); overflow-y: auto; padding: 12px; }
        .control-tab.active { display: block; }
        .tab-btn { font-size: 8px; font-weight: 900; transition: all 0.2s; border-bottom: 2px solid transparent; }
        .tab-btn.active { border-bottom-color: #3b82f6; color: #3b82f6; background: rgba(59, 130, 246, 0.05); }
        
        .inspector-label { font-size: 8px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 4px; display: block; margin-top: 8px; }
        .input-group { background: rgba(30, 41, 59, 0.3); padding: 8px; border-radius: 6px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.05); }
        select, input[type="text"], textarea { background: #0f172a; border: 1px solid #334155; color: white; font-size: 10px; padding: 6px; border-radius: 4px; width: 100%; }
        input[type="range"] { accent-color: #3b82f6; height: 3px; width: 100%; cursor: pointer; }
        .grid-2 { display: grid; grid-template-cols: 1fr 1fr; gap: 8px; }

        .switch { position: relative; display: inline-block; width: 28px; height: 16px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #334155; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #3b82f6; }
        input:checked + .slider:before { transform: translateX(12px); }

        #audio-timeline {
            position: relative;
            width: 100%;
            height: 12px;
            background: #1e293b;
            border-radius: 6px;
            margin-top: 4px;
            cursor: pointer;
            overflow: hidden;
        }
        #timeline-progress {
            position: absolute;
            height: 100%;
            background: #3b82f6;
            width: 0%;
            pointer-events: none;
        }
        
        .sync-input-color { width: 18px; height: 18px; padding: 0; border: none; background: none; cursor: pointer; }
        .sync-input-size { width: 32px !important; text-align: center; font-size: 8px !important; }
        .sync-input-font { width: 50px !important; font-size: 8px !important; height: 20px; }
        
        .upload-font-btn { 
            background: #1e293b; 
            color: #3b82f6; 
            font-size: 7px; 
            padding: 2px 4px; 
            border: 1px dashed #3b82f6; 
            border-radius: 2px;
            cursor: pointer;
        }
        .upload-font-btn:hover { background: #3b82f6; color: white; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .sync-batch-row { background: rgba(59, 130, 246, 0.1); border-top: 2px solid #3b82f6; }
    </style>
</head>
<body class="h-screen flex flex-col bg-slate-950">

    <header class="p-3 bg-slate-900 border-b border-slate-800 flex justify-between items-center z-[1000] shadow-xl">
        <div class="flex items-center gap-3">
            <div class="p-2 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-lg shadow-lg text-white font-black">KS</div>
            <div>
                <h1 class="text-[11px] font-black text-white uppercase tracking-widest leading-none">Karaoke Studio</h1>
                <span class="text-[8px] text-blue-400 font-bold uppercase tracking-widest leading-none">Ultimate Studio v3.4</span>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="document.getElementById('audioInput').click()" class="bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded text-[9px] text-white border border-slate-700">AUDIO</button>
            <button onclick="document.getElementById('bgInput').click()" class="bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded text-[9px] text-white border border-slate-700">BG (IMG/VID)</button>
            <button onclick="document.getElementById('logoInput').click()" class="bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded text-[9px] text-white border border-slate-700">LOGO</button>
            <button onclick="document.getElementById('overlayInput').click()" class="bg-blue-800/50 hover:bg-blue-700 px-3 py-1.5 rounded text-[9px] text-white border border-blue-700">OVERLAY</button>
            <button onclick="document.getElementById('fontInput').click()" class="bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded text-[9px] text-white border border-slate-700">UPLOAD FONT</button>
            <div class="flex gap-1 border-l border-slate-700 pl-2">
                <button onclick="exportData()" class="bg-blue-600 hover:bg-blue-500 px-3 py-1.5 rounded text-[9px] font-black text-white shadow-lg">EXPORT JSON</button>
                <button onclick="document.getElementById('importJsonInput').click()" class="bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded text-[9px] text-white border border-slate-700">IMPORT JSON</button>
                <button onclick="exportSRT()" class="bg-indigo-600 hover:bg-indigo-500 px-3 py-1.5 rounded text-[9px] font-black text-white shadow-lg">EXPORT SRT</button>
            </div>
            
            <input type="file" id="audioInput" accept="audio/*" class="hidden">
            <input type="file" id="bgInput" accept="image/*,video/*" class="hidden">
            <input type="file" id="logoInput" accept="image/*" class="hidden">
            <input type="file" id="overlayInput" accept="image/png" class="hidden" multiple onchange="handleOverlayUpload(this)">
            <input type="file" id="fontInput" accept=".ttf,.otf,.woff" class="hidden" multiple onchange="handleGlobalFontUpload(this)">
            <input type="file" id="importJsonInput" accept=".json" class="hidden" onchange="importData(this)">
        </div>
    </header>

    <main class="flex-1 grid grid-cols-12 overflow-hidden">
        <aside class="col-span-2 border-r border-slate-800 flex flex-col bg-slate-900/40">
            <div class="p-3 border-b border-slate-800">
                <label class="inspector-label" id="textInputLabel">Text Content</label>
                <textarea id="newLineInput" class="h-24 mb-2" placeholder="វាយអត្ថបទទីនេះ... ប្រើ Space ១ដង ដើម្បីផ្ដាច់ពាក្យ និង Space ២ដង ដើម្បីដកឃ្លា"></textarea>
                <div class="grid grid-cols-2 gap-1">
                    <button id="addOrUpdateBtn" onclick="addLineUnified()" class="bg-blue-600 py-2 rounded text-[9px] font-black">ADD LINE</button>
                    <button onclick="cancelEdit()" id="cancelEditBtn" class="bg-slate-700 py-2 rounded text-[9px] font-black hidden">CANCEL</button>
                    <button id="ttsBtn" onclick="generateTTS()" class="bg-indigo-600 py-2 rounded text-[9px] font-black">TTS</button>
                </div>
            </div>
            <div id="lineList" class="flex-1 overflow-y-auto p-2 space-y-2"></div>
        </aside>

        <section class="col-span-7 flex flex-col bg-black relative border-r border-slate-800">
            <div id="previewArea" onclick="deselectAll(event)">
                <div id="canvasContainer" onclick="handleCanvasClick(event)">
                    <div id="bgMediaContainer">
                        <img id="bgImageElement" src="">
                        <video id="bgVideoElement" loop muted playsinline></video>
                    </div>
                    <div id="dynamicOverlaysContainer" class="absolute inset-0 pointer-events-none"></div>
                    <img id="logoOverlay" src="" class="hidden">
                    <div id="vignette"></div>
                    <div id="previewTextContainer"></div>
                </div>
            </div>
            
            <div class="p-3 bg-slate-900 border-t border-slate-800">
                <div id="waveform-container" class="relative">
                    <div id="waveform"></div>
                    <div id="audio-timeline" onclick="seekAudio(event)">
                        <div id="timeline-progress"></div>
                    </div>
                </div>
                
                <div class="flex items-center justify-between mt-3">
                    <div class="flex items-center gap-4">
                        <button onclick="togglePlayPause()" id="playBtn" class="w-10 h-10 bg-blue-600 text-white rounded-full flex items-center justify-center shadow-lg transform active:scale-95">▶</button>
                        <div class="flex flex-col">
                            <span id="currentTimeDisp" class="text-xs font-mono text-white tracking-tighter">00:00.00</span>
                            <span id="durationDisp" class="text-[9px] font-mono text-slate-500">00:00.00</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <input type="range" min="10" max="1000" value="50" oninput="wavesurfer.zoom(this.value)" class="w-24">
                        <input type="range" min="0" max="1" step="0.1" value="1" oninput="wavesurfer.setVolume(this.value)" class="w-16">
                    </div>
                </div>
            </div>
        </section>

        <aside class="col-span-3 bg-slate-950 overflow-hidden flex flex-col">
            <div class="flex overflow-x-auto border-b border-slate-800 bg-slate-900 no-scrollbar">
                <button onclick="showTab('font')" class="tab-btn shrink-0 px-4 py-3 active">TEXT</button>
                <button onclick="showTab('style')" class="tab-btn shrink-0 px-4 py-3">LOOK</button>
                <button onclick="showTab('layout')" class="tab-btn shrink-0 px-4 py-3">POS</button>
                <button onclick="showTab('box')" class="tab-btn shrink-0 px-4 py-3">BOX</button>
                <button onclick="showTab('adj')" class="tab-btn shrink-0 px-4 py-3">IMAGE</button>
                <button onclick="showTab('overlay')" class="tab-btn shrink-0 px-4 py-3">OVERLAY</button>
                <button onclick="showTab('logo')" class="tab-btn shrink-0 px-4 py-3">LOGO</button>
                <button onclick="showTab('sync')" class="tab-btn shrink-0 px-4 py-3">SYNC</button>
            </div>

            <div id="tab-font" class="control-tab active">
                <div class="input-group">
                    <label class="inspector-label">Font Family</label>
                    <select id="fontFamilySelect" onchange="updateStyles()">
                        <option value="'Kantumruy Pro', sans-serif">Kantumruy Pro</option>
                    </select>
                    
                    <label class="inspector-label mt-2">Format</label>
                    <div class="grid grid-cols-4 gap-1">
                        <button onclick="toggleFont('bold')" class="bg-slate-800 p-1 text-[8px] rounded font-bold">B</button>
                        <button onclick="toggleFont('italic')" class="bg-slate-800 p-1 text-[8px] rounded italic">I</button>
                        <button onclick="toggleFont('underline')" class="bg-slate-800 p-1 text-[8px] rounded underline">U</button>
                        <button onclick="toggleFont('line-through')" class="bg-slate-800 p-1 text-[8px] rounded line-through">S</button>
                    </div>
                    <label class="inspector-label mt-2">Size: <span id="v-fontSize">60</span>px</label>
                    <input type="range" id="fontSize" min="10" max="400" value="60" oninput="updateStyles()">
                    <label class="inspector-label mt-2">Spacing</label>
                    <div class="grid-2">
                        <div><span class="text-[7px]">Character</span><input type="range" id="charSpacing" min="-10" max="50" value="0" oninput="updateStyles()"></div>
                        <div><span class="text-[7px]">Line</span><input type="range" id="lineHeight" min="0.5" max="3" step="0.1" value="1.2" oninput="updateStyles()"></div>
                    </div>
                </div>
                <div class="input-group">
                    <label class="inspector-label">Alignment</label>
                    <div class="grid grid-cols-3 gap-1">
                        <button onclick="setTextAlign('left')" class="bg-slate-800 p-1 text-[8px] rounded">LEFT</button>
                        <button onclick="setTextAlign('center')" class="bg-slate-800 p-1 text-[8px] rounded">CENTER</button>
                        <button onclick="setTextAlign('right')" class="bg-slate-800 p-1 text-[8px] rounded">RIGHT</button>
                    </div>
                </div>
            </div>

            <div id="tab-style" class="control-tab">
                <div class="input-group">
                    <label class="inspector-label">Resolution / Aspect Ratio</label>
                    <select id="resSelect" onchange="updateCanvasSize(); updateStyles();">
                        <optgroup label="Landscape (16:9)">
                            <option value="7680x4320">4320p (8K)</option>
                            <option value="3840x2160">2160p (4K)</option>
                            <option value="2560x1440">1440p (2K)</option>
                            <option value="1920x1080" selected>1080p (HD)</option>
                            <option value="1280x720">720p (HD)</option>
                        </optgroup>
                        <optgroup label="Portrait (9:16)">
                            <option value="1080x1920">1080x1920 (TikTok)</option>
                            <option value="720x1280">720x1280 (Shorts)</option>
                        </optgroup>
                        <optgroup label="Square (1:1)">
                            <option value="1080x1080">1080x1080 (Insta)</option>
                        </optgroup>
                    </select>
                </div>
                <!-- NEW: Background Fit Control -->
                <div class="input-group">
                    <label class="inspector-label">Background Scale (Fit)</label>
                    <select id="bgFitSelect" onchange="updateBgScale()">
                        <option value="cover" selected>Fill (Cover)</option>
                        <option value="contain">Fit (Contain)</option>
                        <option value="fill">Stretch</option>
                        <option value="tile">Tile</option>
                        <option value="center">Center</option>
                        <option value="span">Span (100% Width)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label class="inspector-label">Colors</label>
                    <div class="grid grid-cols-2 gap-2">
                        <div><label class="text-[7px]">Primary</label><input type="color" id="primaryColor" value="#ffffff" oninput="updateStyles()"></div>
                        <div><label class="text-[7px]">Active</label><input type="color" id="secondaryColor" value="#fbbf24" oninput="inputAdjust()"></div>
                    </div>
                </div>
                <div class="input-group">
                    <label class="inspector-label">Stroke (Outline)</label>
                    <div class="grid grid-cols-2 gap-2 mb-2">
                        <input type="color" id="strokeColor" value="#000000" oninput="updateStyles()">
                        <input type="range" id="strokeWidth" min="0" max="40" value="2" oninput="updateStyles()">
                    </div>
                    <div class="grid grid-cols-2 gap-2 mb-2">
                        <div>
                            <label class="text-[7px] block">Stroke Order</label>
                            <select id="strokeOrder" onchange="updateStyles()" class="mt-1">
                                <option value="stroke fill">Behind Text (Safe)</option>
                                <option value="fill stroke">Front of Text</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[7px] block">Stroke Join</label>
                            <select id="strokeJoin" onchange="updateStyles()" class="mt-1">
                                <option value="round">Round (Smooth)</option>
                                <option value="miter">Miter (Sharp)</option>
                                <option value="bevel">Bevel (Flat)</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="input-group">
                    <label class="inspector-label">Shadow</label>
                    <div><label class="text-[7px]">Color</label><input type="color" id="shadowColor" value="#000000" oninput="updateStyles()"></div>
                    <div class="grid-2">
                        <div><label class="text-[7px]">X-Offset</label><input type="range" id="shadowX" min="-50" max="50" value="2" oninput="updateStyles()"></div>
                        <div><label class="text-[7px]">Y-Offset</label><input type="range" id="shadowY" min="-50" max="50" value="2" oninput="updateStyles()"></div>
                    </div>
                    <div><label class="text-[7px]">Blur</label><input type="range" id="shadowBlur" min="0" max="50" value="4" oninput="updateStyles()"></div>
                </div>
            </div>

            <div id="tab-layout" class="control-tab">
                <div class="input-group">
                    <label class="inspector-label">Position X-Y</label>
                    <div class="grid-2">
                        <input type="range" id="posX" min="-2000" max="2000" value="0" oninput="updateLinePos()">
                        <input type="range" id="posY" min="-2000" max="2000" value="200" oninput="updateLinePos()">
                    </div>
                </div>
                <div class="input-group">
                    <label class="inspector-label">Scale & Rotation</label>
                    <div class="grid grid-cols-2 gap-2">
                        <div><label class="text-[7px]">Scale X</label><input type="range" id="scaleX" min="0.1" max="5" step="0.1" value="1" oninput="updateStyles()"></div>
                        <div><label class="text-[7px]">Scale Y</label><input type="range" id="scaleY" min="0.1" max="5" step="0.1" value="1" oninput="updateStyles()"></div>
                    </div>
                    <label class="text-[7px] mt-2 block">Rotation</label>
                    <input type="range" id="rotation" min="-180" max="180" value="0" oninput="updateStyles()">
                </div>
            </div>

            <div id="tab-box" class="control-tab">
                <div class="input-group">
                    <div class="flex justify-between items-center mb-2">
                        <label class="inspector-label m-0">Box Background</label>
                        <label class="switch">
                            <input type="checkbox" id="showBox" checked onchange="updateStyles()">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="grid-2">
                        <input type="color" id="boxBgColor" value="#000000" oninput="updateStyles()">
                        <div>
                            <label class="text-[7px] block">Opacity</label>
                            <input type="range" id="boxOpacity" min="0" max="1" step="0.01" value="0.5" oninput="updateStyles()">
                        </div>
                    </div>
                    <div class="grid-2 mt-2">
                        <div><label class="text-[7px]">Rounded</label><input type="range" id="boxRounded" min="0" max="100" value="0" oninput="updateStyles()"></div>
                        <div><label class="text-[7px]">Width</label><input type="range" id="boxWidth" min="0" max="4000" value="0" oninput="updateStyles()"></div>
                    </div>
                    <div class="grid-2 mt-2">
                        <div><label class="text-[7px]">Offset X</label><input type="range" id="boxOffsetX" min="-1000" max="1000" value="0" oninput="updateStyles()"></div>
                        <div><label class="text-[7px]">Offset Y</label><input type="range" id="boxOffsetY" min="-1000" max="1000" value="0" oninput="updateStyles()"></div>
                    </div>
                </div>
            </div>

            <div id="tab-adj" class="control-tab">
                <div class="input-group">
                    <div class="flex justify-between items-center mb-2">
                        <label class="inspector-label m-0">Zoom Transition</label>
                        <label class="switch">
                            <input type="checkbox" id="enableBgZoom" onchange="updateStyles()">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="grid-2">
                        <div>
                            <label class="text-[7px] block">Duration (s)</label>
                            <input type="range" id="bgZoomDuration" min="1" max="60" step="1" value="20" oninput="updateStyles()">
                        </div>
                        <div>
                            <label class="text-[7px] block">Scale Max</label>
                            <input type="range" id="bgZoomMax" min="1" max="2" step="0.05" value="1.2" oninput="updateStyles()">
                        </div>
                    </div>
                </div>
                <div class="input-group">
                    <label class="inspector-label">Basic Color</label>
                    <div><label class="text-[7px]">Brightness</label><input type="range" id="adjBrightness" min="0" max="3" step="0.05" value="1" oninput="inputAdjust()"></div>
                    <div><label class="text-[7px]">Contrast</label><input type="range" id="adjContrast" min="0" max="3" step="0.05" value="1" oninput="inputAdjust()"></div>
                    <div><label class="text-[7px]">Saturation</label><input type="range" id="adjSaturate" min="0" max="3" step="0.05" value="1" oninput="inputAdjust()"></div>
                </div>
                <div class="input-group">
                    <label class="inspector-label">Advanced</label>
                    <div><label class="text-[7px]">Hue Rotate</label><input type="range" id="adjHue" min="0" max="360" value="0" oninput="inputAdjust()"></div>
                    <div><label class="text-[7px]">Blur</label><input type="range" id="adjBlur" min="0" max="50" value="0" oninput="inputAdjust()"></div>
                    <div><label class="text-[7px]">Vignette</label><input type="range" id="vignetteOpacity" min="0" max="1" step="0.05" value="0.5" oninput="inputAdjust()"></div>
                </div>
            </div>

            <div id="tab-overlay" class="control-tab">
                <div class="input-group">
                    <div class="flex justify-between items-center mb-2">
                        <label class="inspector-label m-0">Overlay Inspector</label>
                        <div class="flex gap-1">
                            <button onclick="deselectAll()" class="text-[7px] bg-slate-700 px-2 py-0.5 rounded text-white font-bold">DESELECT</button>
                            <button onclick="removeSelectedOverlay()" class="text-[7px] bg-red-600 px-2 py-0.5 rounded text-white font-bold">DELETE</button>
                        </div>
                    </div>
                    <p id="overlaySelectHint" class="text-[7px] text-slate-500 italic mb-2">សូមចុចលើរូបភាពក្នុង Canvas ដើម្បីកំណត់</p>
                    
                    <div id="overlaySettingsControls" class="opacity-30 pointer-events-none">
                        <div>
                            <label class="text-[7px] block">Width (%)</label>
                            <input type="range" id="ovWidth" min="1" max="100" value="20" oninput="updateOverlayStyle()">
                        </div>
                        <div class="grid-2 mt-2">
                            <div><label class="text-[7px]">Pos X (%)</label><input type="range" id="ovX" min="0" max="100" value="10" oninput="updateOverlayStyle()"></div>
                            <div><label class="text-[7px]">Pos Y (%)</label><input type="range" id="ovY" min="0" max="100" value="10" oninput="updateOverlayStyle()"></div>
                        </div>
                        <div class="mt-2">
                            <label class="text-[7px] block">Opacity</label>
                            <input type="range" id="ovOpacity" min="0" max="1" step="0.1" value="1" oninput="updateOverlayStyle()">
                        </div>
                    </div>
                </div>
            </div>

            <div id="tab-logo" class="control-tab">
                <div class="input-group">
                    <label class="inspector-label">Logo Control</label>
                    <div><label class="text-[7px]">Size</label><input type="range" id="logoWidth" min="10" max="2000" value="150" oninput="updateStyles()"></div>
                    <div><label class="text-[7px]">Opacity</label><input type="range" id="logoOpacity" min="0" max="1" step="0.1" value="1" oninput="updateStyles()"></div>
                    <div class="grid-2 mt-2">
                        <div><label class="text-[7px]">Pos X</label><input type="range" id="logoX" min="0" max="8000" value="50" oninput="updateStyles()"></div>
                        <div><label class="text-[7px]">Pos Y</label><input type="range" id="logoY" min="0" max="8000" value="50" oninput="updateStyles()"></div>
                    </div>
                </div>
            </div>

            <div id="tab-sync" class="control-tab">
                <div class="p-2 border-b border-slate-800 mb-2">
                   <h3 class="text-[10px] font-bold text-blue-400 uppercase">Syllable Styling & Sync</h3>
                   <p class="text-[7px] text-slate-500">កំណត់ស្ទីល និង Upload Font សម្រាប់ពាក្យនីមួយៗ</p>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-[9px]">
                        <thead>
                            <tr class="text-left text-slate-400 border-b border-slate-800">
                                <th class="p-1">WORD</th>
                                <th class="p-1">FONT / UPLOAD</th>
                                <th class="p-1">CLR</th>
                                <th class="p-1">SIZE</th>
                                <th class="p-1 text-right">TIME</th>
                            </tr>
                        </thead>
                        <tbody id="syncTableBody"></tbody>
                        <tfoot id="syncTableFooter" class="hidden">
                             <tr class="sync-batch-row">
                                <td class="p-2 font-black text-blue-400 uppercase text-[8px]">កំណត់រួម<br>(SET ALL)</td>
                                <td class="p-1">
                                    <div class="flex flex-col gap-1">
                                        <select id="batchFont" class="sync-input-font bg-slate-900 border border-blue-500 text-white rounded" onchange="batchUpdateSyllable('font', this.value)"></select>
                                    </div>
                                </td>
                                <td class="p-1"><input type="color" id="batchColor" class="sync-input-color border border-blue-500" oninput="batchUpdateSyllable('color', this.value)"></td>
                                <td class="p-1"><input type="number" id="batchSize" class="sync-input-size text-white bg-slate-900 border border-blue-500 rounded" oninput="batchUpdateSyllable('size', this.value)"></td>
                                <td class="p-1"></td>
                             </tr>
                        </tfoot>
                    </table>
                </div>
                <input type="file" id="syllableFontInput" accept=".ttf,.otf,.woff" class="hidden">
            </div>
        </aside>
    </main>

    <script>
        const apiKey = ""; 
        let allLines = [];
        let editingLineId = null; 
        let editingTextId = null; 
        let wavesurfer;
        
        let textAlign = 'center';
        let fontStyle = 'normal';
        let fontBold = '700';
        let fontDecoration = 'none';
        
        let globalInputState = {};
        let globalTextState = { align: 'center', bold: '700', style: 'normal', decoration: 'none' };
        
        const lineStyleInputIds = [
            'fontFamilySelect', 'fontSize', 'charSpacing', 'lineHeight',
            'primaryColor', 'strokeColor', 'strokeWidth', 'strokeOrder', 'strokeJoin',
            'shadowColor', 'shadowX', 'shadowY', 'shadowBlur', 'scaleX', 'scaleY', 'rotation',
            'showBox', 'boxBgColor', 'boxOpacity', 'boxRounded', 'boxWidth', 'boxOffsetX', 'boxOffsetY'
        ];
        
        let currentRenderedLineIds = null;
        let isDragging = false;
        let dragStartX, dragStartY;
        let initialPosX, initialPosY;
        let draggingLine = null;

        let customFonts = [];
        let overlays = [];
        let selectedOverlayId = null;

        // Promise to track video play state and prevent AbortError
        let videoPlayPromise = Promise.resolve();

        window.onload = () => {
            wavesurfer = WaveSurfer.create({
                container: '#waveform',
                waveColor: '#1e293b',
                progressColor: '#3b82f6',
                cursorColor: '#ffffff',
                height: 100,
                barWidth: 2,
                normalize: true
            });

            wavesurfer.on('audioprocess', updateUI);
            
            wavesurfer.on('seek', () => {
                syncVideoPlayback();
                updateUI();
            });

            wavesurfer.on('play', () => {
                const vid = document.getElementById('bgVideoElement');
                if (vid.src) {
                    videoPlayPromise = vid.play().catch(e => {
                        if (e.name !== 'AbortError') console.error("Playback error:", e);
                    });
                }
            });
            
            wavesurfer.on('pause', () => {
                const vid = document.getElementById('bgVideoElement');
                if (vid.src) {
                    // Wait for play promise before pausing to avoid AbortError
                    videoPlayPromise.then(() => {
                        vid.pause();
                    });
                }
            });

            wavesurfer.on('ready', () => {
                document.getElementById('durationDisp').innerText = formatTime(wavesurfer.getDuration());
            });

            document.getElementById('audioInput').onchange = e => {
                const file = e.target.files[0];
                if(file) wavesurfer.load(URL.createObjectURL(file));
            };

            document.getElementById('bgInput').onchange = e => {
                const file = e.target.files[0];
                if(file) {
                    const url = URL.createObjectURL(file);
                    const img = document.getElementById('bgImageElement');
                    const vid = document.getElementById('bgVideoElement');
                    const container = document.getElementById('bgMediaContainer');
                    
                    if (file.type.startsWith('video/')) {
                        img.style.display = 'none';
                        vid.style.display = 'block';
                        vid.src = url;
                        vid.load();
                        syncVideoPlayback();
                    } else {
                        vid.style.display = 'none';
                        vid.src = "";
                        img.style.display = 'block';
                        img.src = url;
                        // For Tiling
                        container.style.backgroundImage = `url(${url})`;
                    }
                }
            };

            document.getElementById('logoInput').onchange = e => {
                const file = e.target.files[0];
                if(file) {
                    const logo = document.getElementById('logoOverlay');
                    logo.src = URL.createObjectURL(file);
                    logo.classList.remove('hidden');
                }
            };
            
            saveGlobalState();
            updateCanvasSize();
            updateStyles();
            updateBgScale(); // Init BG Scale
        };

        function syncVideoPlayback() {
            const vid = document.getElementById('bgVideoElement');
            if (!vid.src) return;
            const audioTime = wavesurfer.getCurrentTime();
            const vidDuration = vid.duration;
            if (vidDuration > 0) {
                vid.currentTime = audioTime % vidDuration;
            }
            if (wavesurfer.isPlaying()) {
                videoPlayPromise = vid.play().catch(e => {
                    if (e.name !== 'AbortError') console.error("Playback sync error:", e);
                });
            } else {
                videoPlayPromise.then(() => vid.pause());
            }
        }

        // NEW: Update Background Scale Logic
        function updateBgScale() {
            const fit = document.getElementById('bgFitSelect').value;
            const r = document.documentElement;
            const container = document.getElementById('bgMediaContainer');
            
            container.classList.remove('bg-tile-mode');
            
            switch(fit) {
                case 'cover':
                    r.style.setProperty('--bg-object-fit', 'cover');
                    r.style.setProperty('--bg-size', 'cover');
                    r.style.setProperty('--bg-repeat', 'no-repeat');
                    r.style.setProperty('--bg-position', 'center');
                    break;
                case 'contain':
                    r.style.setProperty('--bg-object-fit', 'contain');
                    r.style.setProperty('--bg-size', 'contain');
                    r.style.setProperty('--bg-repeat', 'no-repeat');
                    r.style.setProperty('--bg-position', 'center');
                    break;
                case 'fill':
                    r.style.setProperty('--bg-object-fit', 'fill');
                    r.style.setProperty('--bg-size', '100% 100%');
                    r.style.setProperty('--bg-repeat', 'no-repeat');
                    break;
                case 'tile':
                    container.classList.add('bg-tile-mode');
                    r.style.setProperty('--bg-object-fit', 'none');
                    r.style.setProperty('--bg-size', 'auto');
                    r.style.setProperty('--bg-repeat', 'repeat');
                    r.style.setProperty('--bg-position', 'top left');
                    break;
                case 'center':
                    r.style.setProperty('--bg-object-fit', 'none');
                    r.style.setProperty('--bg-size', 'auto');
                    r.style.setProperty('--bg-repeat', 'no-repeat');
                    r.style.setProperty('--bg-position', 'center');
                    break;
                case 'span':
                    r.style.setProperty('--bg-object-fit', 'contain');
                    r.style.setProperty('--bg-size', '100% auto');
                    r.style.setProperty('--bg-repeat', 'no-repeat');
                    r.style.setProperty('--bg-position', 'center');
                    break;
            }
        }

        function togglePlayPause() {
            wavesurfer.playPause();
        }
        
        function saveGlobalState() {
            lineStyleInputIds.forEach(id => {
                const el = document.getElementById(id);
                globalInputState[id] = el.type === 'checkbox' ? el.checked : el.value;
            });
            globalInputState['secondaryColor'] = document.getElementById('secondaryColor').value;
            globalTextState = { align: textAlign, bold: fontBold, style: fontStyle, decoration: fontDecoration };
        }

        function restoreInputState(state, textState) {
            lineStyleInputIds.forEach(id => {
                const el = document.getElementById(id);
                if (state[id] !== undefined) {
                    if (el.type === 'checkbox') el.checked = state[id];
                    else el.value = state[id];
                }
            });
            if (state['secondaryColor'] !== undefined) {
                document.getElementById('secondaryColor').value = state['secondaryColor'];
            }
            if (textState) {
                textAlign = textState.align; fontBold = textState.bold;
                fontStyle = textState.style; fontDecoration = textState.decoration;
            }
        }

        function deselectAll(e) {
            if (e && e.target.classList.contains('dynamic-overlay')) return;
            selectedOverlayId = null;
            document.getElementById('overlaySelectHint').innerText = "សូមចុចលើរូបភាពក្នុង Canvas ដើម្បីកំណត់";
            document.getElementById('overlaySettingsControls').classList.add('opacity-30', 'pointer-events-none');
            renderOverlays();
        }

        function handleCanvasClick(e) {
            if (e.target.id === 'canvasContainer' || e.target.closest('#bgMediaContainer')) {
                deselectAll();
                if (editingLineId !== null) selectEditingLine(editingLineId); 
            }
        }

        function handleOverlayUpload(input) {
            const files = Array.from(input.files);
            files.forEach(file => {
                const url = URL.createObjectURL(file);
                const id = 'ov-' + Date.now() + Math.random().toString(36).substr(2, 5);
                const newOverlay = { id, url, x: 10, y: 10, width: 20, opacity: 1 };
                overlays.push(newOverlay);
                renderOverlays();
                selectOverlay(id);
                showTab('overlay');
            });
        }

        function renderOverlays() {
            const container = document.getElementById('dynamicOverlaysContainer');
            container.innerHTML = '';
            container.style.pointerEvents = 'none';
            overlays.forEach(ov => {
                const img = document.createElement('img');
                img.src = ov.url;
                img.className = `dynamic-overlay ${ov.id === selectedOverlayId ? 'selected' : ''}`;
                img.style.left = ov.x + '%';
                img.style.top = ov.y + '%';
                img.style.width = ov.width + '%';
                img.style.opacity = ov.opacity;
                img.style.pointerEvents = 'auto';
                img.onmousedown = (e) => {
                    selectOverlay(ov.id);
                    startDraggingOverlay(e, ov);
                    e.stopPropagation();
                };
                container.appendChild(img);
            });
        }

        function selectOverlay(id) {
            selectedOverlayId = id;
            const ov = overlays.find(o => o.id === id);
            if (ov) {
                document.getElementById('ovX').value = ov.x;
                document.getElementById('ovY').value = ov.y;
                document.getElementById('ovWidth').value = ov.width;
                document.getElementById('ovOpacity').value = ov.opacity;
                document.getElementById('overlaySelectHint').innerText = "កំណត់លក្ខណៈនៃ Overlay ដែលបានជ្រើសរើស";
                document.getElementById('overlaySettingsControls').classList.remove('opacity-30', 'pointer-events-none');
            }
            renderOverlays();
        }

        function startDraggingOverlay(e, ov) {
            isDragging = true;
            const startX = e.clientX;
            const startY = e.clientY;
            const startOvX = ov.x;
            const startOvY = ov.y;
            const canvas = document.getElementById('canvasContainer');
            const rect = canvas.getBoundingClientRect();
            function onMove(ev) {
                const dx = ((ev.clientX - startX) / rect.width) * 100;
                const dy = ((ev.clientY - startY) / rect.height) * 100;
                ov.x = Math.max(0, Math.min(100, startOvX + dx));
                ov.y = Math.max(0, Math.min(100, startOvY + dy));
                document.getElementById('ovX').value = ov.x.toFixed(2);
                document.getElementById('ovY').value = ov.y.toFixed(2);
                renderOverlays();
            }
            function onUp() {
                isDragging = false;
                window.removeEventListener('mousemove', onMove);
                window.removeEventListener('mouseup', onUp);
            }
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onUp);
        }

        function updateOverlayStyle() {
            if (!selectedOverlayId) return;
            const ov = overlays.find(o => o.id === selectedOverlayId);
            if (ov) {
                ov.x = parseFloat(document.getElementById('ovX').value);
                ov.y = parseFloat(document.getElementById('ovY').value);
                ov.width = parseFloat(document.getElementById('ovWidth').value);
                ov.opacity = parseFloat(document.getElementById('ovOpacity').value);
                renderOverlays();
            }
        }

        function removeSelectedOverlay() {
            if (!selectedOverlayId) return;
            overlays = overlays.filter(o => o.id !== selectedOverlayId);
            selectedOverlayId = null;
            document.getElementById('overlaySelectHint').innerText = "សូមចុចលើរូបភាពក្នុង Canvas ដើម្បីកំណត់";
            document.getElementById('overlaySettingsControls').classList.add('opacity-30', 'pointer-events-none');
            renderOverlays();
        }

        function handleGlobalFontUpload(input) {
            const files = Array.from(input.files);
            files.forEach(file => { loadFontFile(file); });
        }

        function loadFontFile(file, callback = null) {
            const fontName = 'Font_' + file.name.split('.')[0].replace(/[^a-zA-Z0-9]/g, '_');
            const reader = new FileReader();
            reader.onload = async (e) => {
                const fontData = e.target.result;
                const font = new FontFace(fontName, fontData);
                try {
                    await font.load();
                    document.fonts.add(font);
                    if (!customFonts.includes(fontName)) {
                        customFonts.push(fontName);
                        const sel = document.getElementById('fontFamilySelect');
                        const opt = document.createElement('option');
                        opt.value = fontName;
                        opt.textContent = file.name.substring(0, 15);
                        sel.appendChild(opt);
                        
                        const batchSel = document.getElementById('batchFont');
                        const batchOpt = document.createElement('option');
                        batchOpt.value = fontName;
                        batchOpt.textContent = file.name.substring(0, 10);
                        batchSel.appendChild(batchOpt);
                    }
                    if (callback) callback(fontName);
                    updateStyles();
                    renderTable();
                } catch (err) { console.error("Font loading error:", err); }
            };
            reader.readAsArrayBuffer(file);
        }

        function setTextAlign(val) { textAlign = val; updateStyles(); }

        function toggleFont(type) {
            if(type === 'bold') fontBold = fontBold === '700' ? '400' : '700';
            if(type === 'italic') fontStyle = fontStyle === 'italic' ? 'normal' : 'italic';
            if(type === 'underline') fontDecoration = fontDecoration === 'underline' ? 'none' : 'underline';
            if(type === 'line-through') fontDecoration = fontDecoration === 'line-through' ? 'none' : 'line-through';
            updateStyles();
        }

        function addLineUnified() {
            const textarea = document.getElementById('newLineInput');
            const rawContent = textarea.value.trim();
            if (!rawContent) return;

            const lines = rawContent.split(/\n/);
            const syllables = [];

            lines.forEach((lText, lineIdx) => {
                const parts = lText.split(' ');
                for (let i = 0; i < parts.length; i++) {
                    const part = parts[i];
                    if (part === "") {
                        syllables.push({ text: " ", time: null, lineIdx: lineIdx, isSpace: true });
                    } else {
                        syllables.push({ text: part, time: null, lineIdx: lineIdx, color: null, fontSize: null, font: null });
                    }
                }
            });

            let cleanTitle = rawContent.replace(/\s+/g, ' ').substring(0, 15) + "...";

            if (editingTextId !== null) {
                const line = allLines.find(l => l.id === editingTextId);
                if (line) {
                    line.title = cleanTitle;
                    line.syllables = syllables;
                    line.maxLines = lines.length;
                }
                cancelEdit(); 
            } else {
                const lineId = Date.now();
                allLines.push({ 
                    id: lineId, 
                    title: cleanTitle, 
                    syllables, 
                    startTime: wavesurfer.getCurrentTime(), 
                    endTime: wavesurfer.getCurrentTime() + 5, 
                    maxLines: lines.length,
                    posX: 0,
                    posY: 200,
                    customInputState: null,
                    customTextState: null
                });
                selectEditingLine(lineId);
            }
            
            textarea.value = '';
            renderLineList();
            forceReRender();
        }

        function startEditLine(e, id) {
            e.stopPropagation();
            const line = allLines.find(l => l.id === id);
            if (!line) return;

            editingTextId = id;
            const textarea = document.getElementById('newLineInput');
            
            const reconstructedLines = [];
            for (let i = 0; i < line.maxLines; i++) {
                reconstructedLines.push(line.syllables.filter(s => s.lineIdx === i).map(s => s.text).join(''));
            }
            textarea.value = reconstructedLines.join('\n');
            
            document.getElementById('textInputLabel').innerText = "Editing Line...";
            document.getElementById('addOrUpdateBtn').innerText = "UPDATE LINE";
            document.getElementById('addOrUpdateBtn').classList.replace('bg-blue-600', 'bg-green-600');
            document.getElementById('cancelEditBtn').classList.remove('hidden');
            document.getElementById('ttsBtn').classList.add('hidden');
        }

        function cancelEdit() {
            editingTextId = null;
            document.getElementById('newLineInput').value = '';
            document.getElementById('textInputLabel').innerText = "Text Content";
            document.getElementById('addOrUpdateBtn').innerText = "ADD LINE";
            document.getElementById('addOrUpdateBtn').classList.replace('bg-green-600', 'bg-blue-600');
            document.getElementById('cancelEditBtn').classList.add('hidden');
            document.getElementById('ttsBtn').classList.remove('hidden');
        }

        function renderLineList() {
            const container = document.getElementById('lineList');
            container.innerHTML = '';
            allLines.forEach(line => {
                const isActive = line.id === editingLineId;
                const div = document.createElement('div');
                div.className = `p-2 rounded border border-slate-800 cursor-pointer text-[9px] transition-all ${isActive ? 'bg-blue-600 ring-2 ring-blue-400 ring-inset' : 'bg-slate-800'}`;
                div.innerHTML = `
                    <div class="flex justify-between font-bold items-center">
                        <span class="truncate pr-2">${line.title}</span>
                        <div class="flex gap-1">
                            <button onclick="startEditLine(event, ${line.id})" class="bg-blue-400/20 hover:bg-blue-400/40 p-1 rounded text-[7px]">EDIT</button>
                            <button onclick="removeLine(event, ${line.id})" class="bg-red-500/20 hover:bg-red-500/40 px-2 py-1 rounded text-[7px]">×</button>
                        </div>
                    </div>
                    <div class="flex justify-between mt-1 text-[7px] text-slate-300">
                        <span>IN: ${formatTime(line.startTime)}</span>
                        <span>OUT: ${formatTime(line.endTime)}</span>
                    </div>
                    <div class="grid grid-cols-2 gap-1 mt-1">
                        <button onclick="setLineTime(event, ${line.id}, 'start')" class="bg-black/30 py-1 rounded hover:bg-black/50">SET IN</button>
                        <button onclick="setLineTime(event, ${line.id}, 'end')" class="bg-black/30 py-1 rounded hover:bg-black/50">SET OUT</button>
                    </div>`;
                div.onclick = (e) => { e.stopPropagation(); selectEditingLine(line.id); };
                container.appendChild(div);
            });
        }

        function setLineTime(e, id, type) {
            e.stopPropagation();
            const line = allLines.find(l => l.id === id);
            if(line) {
                if(type === 'start') line.startTime = wavesurfer.getCurrentTime();
                else line.endTime = wavesurfer.getCurrentTime();
                renderLineList();
                forceReRender();
            }
        }

        function selectEditingLine(id) { 
            if (editingLineId === id) {
                editingLineId = null;
                restoreInputState(globalInputState, globalTextState);
                updateStyles();
            } else {
                editingLineId = id; 
                const line = allLines.find(l => l.id === id);
                if(line) {
                    if (!line.customInputState) {
                        restoreInputState(globalInputState, globalTextState);
                    } else {
                        restoreInputState(line.customInputState, line.customTextState);
                    }
                    document.getElementById('posX').value = line.posX || 0;
                    document.getElementById('posY').value = line.posY || 0;
                }
            }
            renderLineList(); 
            renderTable(); 
            forceReRender(); 
        }

        function removeLine(e, id) { 
            e.stopPropagation(); 
            allLines = allLines.filter(l => l.id !== id); 
            if(editingLineId === id) {
                editingLineId = null;
                restoreInputState(globalInputState, globalTextState);
            }
            if(editingTextId === id) cancelEdit();
            renderLineList(); 
            forceReRender();
        }

        function renderTable() {
            const body = document.getElementById('syncTableBody');
            const footer = document.getElementById('syncTableFooter');
            body.innerHTML = '';
            const line = allLines.find(l => l.id === editingLineId);
            
            if (!line) {
                footer.classList.add('hidden');
                return;
            }
            
            footer.classList.remove('hidden');
            
            const batchFont = document.getElementById('batchFont');
            batchFont.innerHTML = '<option value="">Default Font</option>';
            customFonts.forEach(f => {
                const opt = document.createElement('option');
                opt.value = f;
                opt.textContent = f.substring(0, 10);
                batchFont.appendChild(opt);
            });
            
            line.syllables.forEach((s, idx) => {
                if (s.isSpace) return;
                const row = document.createElement('tr');
                row.className = 'border-b border-slate-900 hover:bg-slate-800/50';
                let fontOptions = `<option value="">Default</option>`;
                customFonts.forEach(f => {
                    fontOptions += `<option value="${f}" ${s.font === f ? 'selected' : ''}>${f.substring(0, 10)}</option>`;
                });
                row.innerHTML = `
                    <td class="p-1"><div class="font-bold text-white cursor-pointer" onclick="syncSyllable(${idx})">${s.text}</div></td>
                    <td class="p-1">
                        <div class="flex flex-col gap-1">
                            <select class="sync-input-font bg-slate-900 border border-slate-700 text-white rounded" onchange="updateSyllableStyle(${idx}, 'font', this.value)">${fontOptions}</select>
                            <button class="upload-font-btn" onclick="triggerSyllableFontUpload(${idx})">UPLOAD</button>
                        </div>
                    </td>
                    <td class="p-1"><input type="color" class="sync-input-color" value="${s.color || document.getElementById('primaryColor').value}" oninput="updateSyllableStyle(${idx}, 'color', this.value)"></td>
                    <td class="p-1"><input type="number" class="sync-input-size text-white bg-slate-900 border border-slate-700 rounded" value="${s.fontSize || document.getElementById('fontSize').value}" oninput="updateSyllableStyle(${idx}, 'size', this.value)"></td>
                    <td class="p-1 text-right font-mono text-blue-400 cursor-pointer" onclick="syncSyllable(${idx})">${s.time ? s.time.toFixed(2) : '--'}</td>
                `;
                body.appendChild(row);
            });
        }

        function triggerSyllableFontUpload(idx) {
            const input = document.getElementById('syllableFontInput');
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) { loadFontFile(file, (fontName) => { updateSyllableStyle(idx, 'font', fontName); }); }
            };
            input.click();
        }

        function syncSyllable(idx) {
            const line = allLines.find(l => l.id === editingLineId);
            if (line) {
                line.syllables[idx].time = wavesurfer.getCurrentTime();
                renderTable();
                updateUI();
            }
        }

        function updateSyllableStyle(idx, type, value) {
            const line = allLines.find(l => l.id === editingLineId);
            if (!line) return;
            if (type === 'color') line.syllables[idx].color = value;
            if (type === 'size') line.syllables[idx].fontSize = value;
            if (type === 'font') line.syllables[idx].font = value;
            forceReRender();
        }
        
        function batchUpdateSyllable(type, value) {
            const line = allLines.find(l => l.id === editingLineId);
            if (!line) return;
            line.syllables.forEach(s => {
                if (s.isSpace) return;
                if (type === 'color') s.color = value;
                if (type === 'size') s.fontSize = value;
                if (type === 'font') s.font = value;
            });
            renderTable(); 
            forceReRender(); 
        }

        function seekAudio(event) {
            const rect = event.currentTarget.getBoundingClientRect();
            wavesurfer.seekTo((event.clientX - rect.left) / rect.width);
        }
        
        function forceReRender() {
            currentRenderedLineIds = null;
            updateUI();
        }

        function updateLinePos() {
            if(editingLineId) {
                const line = allLines.find(l => l.id === editingLineId);
                if(line) {
                    line.posX = parseFloat(document.getElementById('posX').value);
                    line.posY = parseFloat(document.getElementById('posY').value);
                    const el = document.getElementById('line-el-' + line.id);
                    if(el) { 
                        const rot = line.customInputState ? line.customInputState.rotation : document.getElementById('rotation').value;
                        el.style.transform = `translate(calc(-50% + ${line.posX}px), calc(-50% + ${line.posY}px)) rotate(${rot}deg)`; 
                    }
                }
            }
        }

        function makeDraggable(el, line) {
            el.onmousedown = function(e) {
                if(e.button !== 0) return; 
                isDragging = true;
                draggingLine = line;
                const canvas = document.getElementById('canvasContainer');
                const rect = canvas.getBoundingClientRect();
                const res = document.getElementById('resSelect').value.split('x');
                const nativeW = parseInt(res[0]);
                const nativeH = parseInt(res[1]);
                const scaleX = nativeW / rect.width;
                const scaleY = nativeH / rect.height;
                dragStartX = e.clientX;
                dragStartY = e.clientY;
                initialPosX = line.posX || 0;
                initialPosY = line.posY || 0;
                
                if (editingLineId !== line.id) selectEditingLine(line.id);
                
                function onMouseMove(ev) {
                    if(!isDragging) return;
                    const dx = (ev.clientX - dragStartX) * scaleX;
                    const dy = (ev.clientY - dragStartY) * scaleY;
                    line.posX = initialPosX + dx;
                    line.posY = initialPosY + dy;
                    const rot = line.customInputState ? line.customInputState.rotation : document.getElementById('rotation').value;
                    el.style.transform = `translate(calc(-50% + ${line.posX}px), calc(-50% + ${line.posY}px)) rotate(${rot}deg)`;
                    if(editingLineId === line.id) {
                        document.getElementById('posX').value = line.posX;
                        document.getElementById('posY').value = line.posY;
                    }
                }
                function onMouseUp() {
                    isDragging = false;
                    draggingLine = null;
                    window.removeEventListener('mousemove', onMouseMove);
                    window.removeEventListener('mouseup', onMouseUp);
                }
                window.addEventListener('mousemove', onMouseMove);
                window.addEventListener('mouseup', onMouseUp);
                e.stopPropagation();
            };
        }

        function updateUI() {
            const currentTime = wavesurfer.getCurrentTime();
            document.getElementById('currentTimeDisp').innerText = formatTime(currentTime);
            document.getElementById('timeline-progress').style.width = (currentTime / wavesurfer.getDuration() * 100) + '%';
            
            const vid = document.getElementById('bgVideoElement');
            if (vid.src && wavesurfer.isPlaying()) {
                const vidDuration = vid.duration;
                if (vidDuration > 0) {
                   const expectedTime = currentTime % vidDuration;
                   if (Math.abs(vid.currentTime - expectedTime) > 0.3) {
                       vid.currentTime = expectedTime;
                   }
                }
            }

            let activeLines = allLines.filter(l => currentTime >= l.startTime && currentTime <= l.endTime);
            let activeLineIds = activeLines.map(l => l.id).join(',');
            const container = document.getElementById('previewTextContainer');
            
            if (currentRenderedLineIds !== activeLineIds) {
                container.innerHTML = '';
                activeLines.forEach(activeLine => {
                    const previewText = document.createElement('div');
                    previewText.className = 'preview-text-element';
                    previewText.id = 'line-el-' + activeLine.id;
                    if (activeLine.customInputState) {
                        applyLineStylesToElement(previewText, activeLine);
                        previewText.style.transform = `translate(calc(-50% + ${activeLine.posX}px), calc(-50% + ${activeLine.posY}px)) rotate(${activeLine.customInputState.rotation}deg)`;
                    } else {
                        previewText.dataset.align = textAlign;
                        previewText.style.transform = `translate(calc(-50% + ${activeLine.posX}px), calc(-50% + ${activeLine.posY}px)) rotate(${document.getElementById('rotation').value}deg)`;
                    }
                    const box = document.createElement('div');
                    box.className = 'opaque-box';
                    for (let i = 0; i < activeLine.maxLines; i++) {
                        const lineDiv = document.createElement('div');
                        lineDiv.className = 'line-block';
                        const lineSyllables = activeLine.syllables.map((s, idx) => ({s, idx})).filter(item => item.s.lineIdx === i);
                        lineSyllables.forEach((item) => {
                            const s = item.s;
                            const idx = item.idx;
                            const span = document.createElement('span');
                            span.id = `syllable-${activeLine.id}-${idx}`;
                            if (s.isSpace) {
                                span.innerText = " ";
                                span.className = "syllable-item";
                            } else {
                                span.innerText = s.text;
                                span.className = `syllable-item`;
                                if (s.color) span.style.setProperty('--individual-color', s.color);
                                if (s.fontSize) span.style.setProperty('--individual-size', s.fontSize + 'px');
                                if (s.font) span.style.setProperty('--individual-font', s.font);
                                else span.style.setProperty('--individual-font', "var(--active-font-family)");
                            }
                            lineDiv.appendChild(span);
                        });
                        box.appendChild(lineDiv);
                    }
                    previewText.appendChild(box);
                    makeDraggable(previewText, activeLine);
                    container.appendChild(previewText);
                });
                currentRenderedLineIds = activeLineIds;
            }
            
            activeLines.forEach(activeLine => {
                activeLine.syllables.forEach((s, i) => {
                    if (s.isSpace) return;
                    const span = document.getElementById(`syllable-${activeLine.id}-${i}`);
                    if (span) {
                        const isActive = s.time !== null && currentTime >= s.time;
                        if (isActive) span.classList.add('active-syllable');
                        else span.classList.remove('active-syllable');
                    }
                });
                if (!isDragging) {
                     const el = document.getElementById('line-el-' + activeLine.id);
                     if (el) {
                         const rot = activeLine.customInputState ? activeLine.customInputState.rotation : document.getElementById('rotation').value;
                         el.style.transform = `translate(calc(-50% + ${activeLine.posX}px), calc(-50% + ${activeLine.posY}px)) rotate(${rot}deg)`;
                     }
                }
            });
            
            const pBtn = document.getElementById('playBtn');
            pBtn.innerText = wavesurfer.isPlaying() ? '⏸' : '▶';
        }

        function hexToRgba(hex, opacity) {
            let r = 0, g = 0, b = 0;
            if (hex.length == 4) { r = parseInt(hex[1] + hex[1], 16); g = parseInt(hex[2] + hex[2], 16); b = parseInt(hex[3] + hex[3], 16); } 
            else if (hex.length == 7) { r = parseInt(hex.substring(1, 3), 16); g = parseInt(hex.substring(3, 5), 16); b = parseInt(hex.substring(5, 7), 16); }
            return `rgba(${r}, ${g}, ${b}, ${opacity})`;
        }

        function formatTime(s) {
            if (isNaN(s)) return "00:00.00";
            const m = Math.floor(s / 60);
            const sec = (s % 60).toFixed(2);
            return `${m.toString().padStart(2,'0')}:${sec.padStart(5,'0')}`;
        }
        
        function formatSRTTime(seconds) {
            if (isNaN(seconds) || seconds === null) return "00:00:00,000";
            const date = new Date(seconds * 1000);
            const hh = String(Math.floor(seconds / 3600)).padStart(2, '0');
            const mm = String(date.getUTCMinutes()).padStart(2, '0');
            const ss = String(date.getUTCSeconds()).padStart(2, '0');
            const ms = String(date.getUTCMilliseconds()).padStart(3, '0');
            return `${hh}:${mm}:${ss},${ms}`;
        }

        function updateCanvasSize() {
            const res = document.getElementById('resSelect').value.split('x');
            const w = parseInt(res[0]); const h = parseInt(res[1]);
            const area = document.getElementById('previewArea');
            if(!area) return;
            const ratio = Math.min((area.clientWidth-40)/w, (area.clientHeight-40)/h);
            const canvas = document.getElementById('canvasContainer');
            if(!canvas) return;
            canvas.style.width = (w * ratio) + 'px'; canvas.style.height = (h * ratio) + 'px';
            const posXInp = document.getElementById('posX'); const posYInp = document.getElementById('posY');
            posXInp.min = -w; posXInp.max = w; posYInp.min = -h; posYInp.max = h;
            const boxOffsetXInp = document.getElementById('boxOffsetX'); const boxOffsetYInp = document.getElementById('boxOffsetY');
            boxOffsetXInp.min = -w/2; boxOffsetXInp.max = w/2; boxOffsetYInp.min = -h/2; boxOffsetYInp.max = h/2;
            const logoXInp = document.getElementById('logoX'); const logoYInp = document.getElementById('logoY');
            logoXInp.max = w; logoYInp.max = h;
        }

        function exportData() {
            const dataToExport = {
                version: "3.4",
                resolution: document.getElementById('resSelect').value,
                bgFit: document.getElementById('bgFitSelect').value,
                globalInputState: globalInputState,
                globalTextState: globalTextState,
                overlays: overlays,
                lines: allLines.map(l => ({
                    id: l.id, title: l.title, startTime: l.startTime, endTime: l.endTime, maxLines: l.maxLines, posX: l.posX, posY: l.posY,
                    customInputState: l.customInputState, customTextState: l.customTextState,
                    syllables: l.syllables.map(s => ({ text: s.text, time: s.time, lineIdx: s.lineIdx, isSpace: s.isSpace, color: s.color, fontSize: s.fontSize, font: s.font }))
                }))
            };
            const blob = new Blob([JSON.stringify(dataToExport, null, 2)], {type: 'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'karaoke_project.json'; a.click();
        }
        
        function importData(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.resolution) document.getElementById('resSelect').value = data.resolution;
                    if (data.bgFit) {
                        document.getElementById('bgFitSelect').value = data.bgFit;
                        updateBgScale();
                    }
                    if (data.globalInputState) globalInputState = data.globalInputState;
                    if (data.globalTextState) globalTextState = data.globalTextState;
                    if (data.overlays) { overlays = data.overlays; renderOverlays(); }
                    if (data.lines) { allLines = data.lines; renderLineList(); }
                    updateCanvasSize();
                    restoreInputState(globalInputState, globalTextState);
                    updateStyles();
                    forceReRender();
                } catch (err) { alert("Error: " + err.message); }
            };
            reader.readAsText(file);
        }
        
        function exportSRT() {
            if (allLines.length === 0) return;
            const sortedLines = [...allLines].sort((a, b) => a.startTime - b.startTime);
            let srtContent = "";
            sortedLines.forEach((line, index) => {
                const start = formatSRTTime(line.startTime);
                const end = formatSRTTime(line.endTime);
                let lineText = "";
                for(let i=0; i<line.maxLines; i++) {
                     lineText += line.syllables.filter(s => s.lineIdx === i).map(s => s.text).join('') + "\n";
                }
                srtContent += `${index + 1}\n${start} --> ${end}\n${lineText.trim()}\n\n`;
            });
            const blob = new Blob([srtContent], { type: 'text/plain;charset=utf-8' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'subtitles.srt'; a.click();
        }

        async function generateTTS() {
            const text = document.getElementById('newLineInput').value.trim();
            if(!text) return;
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Say: ${text}` }] }],
                        generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } } }
                    })
                });
                const result = await response.json();
                const audioData = result.candidates[0].content.parts[0].inlineData.data;
                wavesurfer.load(URL.createObjectURL(pcmToWavBlob(audioData, 24000)));
                addLineUnified();
            } catch (e) { console.error(e); }
        }

        function pcmToWavBlob(base64, sampleRate) {
            const buffer = Uint8Array.from(atob(base64), c => c.charCodeAt(0)).buffer;
            const wavHeader = new ArrayBuffer(44);
            const view = new DataView(wavHeader);
            view.setUint32(0, 0x52494646, false); view.setUint32(4, 36 + buffer.byteLength, true);
            view.setUint32(8, 0x57415645, false); view.setUint32(12, 0x666d7420, false);
            view.setUint16(16, 16, true); view.setUint16(20, 1, true);
            view.setUint16(22, 1, true); view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true); view.setUint16(32, 2, true);
            view.setUint16(34, 16, true); view.setUint32(36, 0x64617461, false);
            view.setUint32(40, buffer.byteLength, true);
            return new Blob([wavHeader, buffer], { type: 'audio/wav' });
        }
        window.addEventListener('resize', updateCanvasSize);
    </script>
