<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Animator Pro V7.3 - Audio Ducking Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Battambang:wght@400;700&family=Koulen&family=Moul&family=Freehand&family=Dangrek&family=Odor+Mean+Chey&family=Fascinate&display=swap');
        
        :root { --primary: #2563eb; }
        body { font-family: 'Battambang', sans-serif; background-color: #f1f5f9; color: #1e293b; overflow-x: hidden; }

        /* Canvas Styles */
        #canvasWrapper {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            background-color: #000;
            overflow: hidden;
            border-radius: 2rem;
            margin: auto;
        }

        .canvas-area {
            position: relative;
            display: flex;
            width: 100%;
            height: 100%;
            z-index: 2;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
            scrollbar-width: none;
        }
        .canvas-area::-webkit-scrollbar { display: none; }

        #bgLayer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: all 0.5s;
        }

        /* Animations */
        @keyframes bg-zoom { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes bg-pan { 0% { background-position: left center; } 50% { background-position: right center; } 100% { background-position: left center; } }
        @keyframes bg-pulse { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }

        .anim-zoom { animation: bg-zoom 10s infinite ease-in-out; }
        .anim-pan { animation: bg-pan 15s infinite ease-in-out; }
        .anim-pulse { animation: bg-pulse 5s infinite ease-in-out; }

        @keyframes slide-in-bottom { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slide-in-left { from { opacity: 0; transform: translateX(-50px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes slide-in-right { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes zoom-in { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
        
        @keyframes fade-out { from { opacity: 1; transform: scale(1); } to { opacity: 0; transform: scale(0.9); } }
        @keyframes slide-out-top { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-50px); } }

        .msg-entry-bottom { animation: slide-in-bottom 0.5s ease-out forwards; }
        .msg-entry-left { animation: slide-in-left 0.5s ease-out forwards; }
        .msg-entry-right { animation: slide-in-right 0.5s ease-out forwards; }
        .msg-entry-zoom { animation: zoom-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        .msg-exit-fade { animation: fade-out 0.5s ease-in forwards; }
        .msg-exit-top { animation: slide-out-top 0.5s ease-in forwards; }

        .active-msg { z-index: 100; transform: scale(1.05); transition: transform 0.3s; }
        .inactive-msg { opacity: 0.4; filter: blur(1px); transition: all 0.5s; }

        /* UI */
        .control-section { background: white; border-radius: 16px; padding: 20px; margin-bottom: 20px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .label-sm { font-size: 11px; font-weight: 800; color: #64748b; margin-bottom: 5px; display: block; text-transform: uppercase; letter-spacing: 0.05em; }
        .input-ui { width: 100%; border: 1px solid #cbd5e1; padding: 8px 12px; border-radius: 8px; font-size: 13px; outline: none; transition: all 0.2s; background: #fff; }
        .input-ui:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        
        #aiLoading {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(8px); z-index: 10000; align-items: center; justify-content: center;
        }

        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .file-input-wrapper {
            position: relative; overflow: hidden; display: inline-block; width: 100%;
        }
        .file-input-wrapper input[type=file] {
            font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer;
        }
        .file-btn {
            background: #f8fafc; border: 1px dashed #cbd5e1; padding: 8px; border-radius: 8px; 
            text-align: center; width: 100%; display: block; font-size: 11px; color: #64748b;
        }

        #toast {
            visibility: hidden; min-width: 200px; background-color: #333; color: #fff; text-align: center; border-radius: 8px; padding: 12px;
            position: fixed; z-index: 10001; bottom: 30px; left: 50%; transform: translateX(-50%); font-size: 14px;
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from { bottom: 0; opacity: 0; } to { bottom: 30px; opacity: 1; } }
        @keyframes fadeout { from { bottom: 30px; opacity: 1; } to { bottom: 0; opacity: 0; } }

        /* FX Panel */
        .fx-panel { display: none; margin-top: 10px; padding: 10px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; }
        .fx-panel.active { display: block; }
    </style>
</head>
<body class="p-4 lg:p-8">

    <div id="aiLoading">
        <div class="text-center">
            <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-blue-600 mx-auto mb-4"></div>
            <p class="font-black text-slate-800 text-lg font-moul">កំពុងវិភាគតួនាទី និងបង្កើតស្គ្រីប...</p>
        </div>
    </div>

    <div id="toast">បានចម្លងអត្ថបទរួចរាល់!</div>

    <div class="max-w-[1700px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- ផ្នែកខាងឆ្វេង: ការគ្រប់គ្រង -->
        <div class="lg:col-span-8 space-y-6 h-[90vh] overflow-y-auto pr-2 custom-scroll">
            
            <div class="flex flex-col md:flex-row md:items-center justify-between sticky top-0 bg-[#f1f5f9] z-50 py-2 gap-4">
                <div>
                    <h1 class="text-3xl font-black text-slate-900 leading-none">CHAT <span class="text-blue-600">ANIMATOR</span></h1>
                    <p class="text-[10px] font-bold text-slate-400 uppercase">V7.3 AUDIO DUCKING</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="exportProject()" class="bg-white border border-slate-300 text-slate-700 px-4 py-2 rounded-xl text-xs font-black hover:bg-slate-50 flex items-center gap-2 transition">
                        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg> រក្សាទុក Project
                    </button>
                    <div class="relative">
                        <button class="bg-white border border-slate-300 text-slate-700 px-4 py-2 rounded-xl text-xs font-black hover:bg-slate-50 flex items-center gap-2 transition">
                            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l4-4m0 0l4 4m-4-4v12"/></svg> បើក Project
                        </button>
                        <input type="file" accept=".json" onchange="importProject(event)" class="absolute inset-0 opacity-0 cursor-pointer">
                    </div>
                    <button id="playBtn" onclick="playPreview()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-xl font-black shadow-lg transition transform active:scale-95 flex items-center gap-2 text-sm">
                        <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> ផលិតវីដេអូ
                    </button>
                </div>
            </div>

            <!-- ១. AI Engine -->
            <div class="control-section border-l-4 border-blue-600 bg-blue-50/30">
                <h3 class="font-black text-blue-600 mb-4 flex items-center gap-2">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                    AI Script Generator
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-12 gap-4">
                    <div class="md:col-span-8">
                        <label class="label-sm">ប្រធានបទសន្ទនា</label>
                        <input type="text" id="aiTopic" placeholder="ឧ៖ ការពិភាក្សារវាងមេបញ្ជាការ និងកូនចៅ..." class="input-ui">
                    </div>
                    <div class="md:col-span-2">
                        <label class="label-sm">ចំនួនសារ</label>
                        <input type="number" id="aiMsgCount" value="6" class="input-ui">
                    </div>
                    <div class="md:col-span-2 self-end">
                        <button onclick="generateAIScript()" class="w-full bg-slate-900 text-white h-10 rounded-lg font-bold text-xs hover:bg-black">GENERATE</button>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- ២. ផ្ទៃក្រោយ -->
                <div class="control-section">
                    <h3 class="font-black text-indigo-600 mb-4 pb-2 border-b uppercase text-xs tracking-widest">២. ផ្ទៃក្រោយ & ចលនា</h3>
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="label-sm">ជ្រើសរើសរូបភាព</label>
                                <div class="file-input-wrapper">
                                    <button class="file-btn">Upload Image</button>
                                    <input type="file" accept="image/*" onchange="handleBgImage(event)">
                                </div>
                            </div>
                            <div>
                                <label class="label-sm">ពណ៌ផ្ទៃក្រោយ</label>
                                <input type="color" id="bgColor" value="#000000" oninput="updateCanvasStyles()" class="w-full h-9 rounded-lg cursor-pointer">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="label-sm">ទំហំរូបភាព</label>
                                <select id="bgSize" onchange="updateCanvasStyles()" class="input-ui">
                                    <option value="cover">ពេញ (Cover)</option>
                                    <option value="contain">ល្មម (Contain)</option>
                                    <option value="auto">ដើម (Original)</option>
                                    <option value="repeat">ផ្ទួនៗ (Tile)</option>
                                </select>
                            </div>
                            <div>
                                <label class="label-sm">ចលនាផ្ទៃក្រោយ</label>
                                <select id="bgAnim" onchange="updateCanvasStyles()" class="input-ui">
                                    <option value="none">គ្មាន</option>
                                    <option value="anim-zoom">Zoom In/Out</option>
                                    <option value="anim-pan">Pan Left/Right</option>
                                    <option value="anim-pulse">Pulse Fade</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ៣. ស្ទាយអក្សរ -->
                <div class="control-section">
                    <h3 class="font-black text-slate-800 mb-4 pb-2 border-b uppercase text-xs tracking-widest">៣. ស្ទាយអក្សរ & Fonts</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="label-sm">Font ផ្ទាល់ខ្លួន</label>
                            <div class="file-input-wrapper">
                                <button class="file-btn" id="fontFileLabel">បញ្ចូលឯកសារ Font</button>
                                <input type="file" accept=".ttf,.otf,.woff,.woff2" onchange="handleLocalFont(event)">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="label-sm">ជ្រើសរើស Font</label>
                                <select id="fontFamily" onchange="updateCanvasStyles()" class="input-ui">
                                    <option value="font-battambang">Battambang</option>
                                    <option value="font-koulen">Koulen</option>
                                    <option value="font-moul">Moul</option>
                                    <option value="font-dangrek">Dangrek</option>
                                    <option id="optCustomFont" value="custom" style="display:none;">Font ផ្ទាល់ខ្លួន</option>
                                </select>
                            </div>
                            <div>
                                <label class="label-sm">ទំហំ (px)</label>
                                <input type="number" id="fontSize" value="16" oninput="updateCanvasStyles()" class="input-ui">
                            </div>
                        </div>
                        <div>
                            <label class="label-sm">កោង Bubble (px)</label>
                            <input type="range" id="bubbleRadius" min="0" max="40" value="20" oninput="updateCanvasStyles()" class="w-full h-2 bg-slate-100 rounded-lg appearance-none cursor-pointer">
                        </div>
                    </div>
                </div>
            </div>

            <!-- ៤. ប្លង់ & View Mode -->
            <div class="control-section">
                <h3 class="font-black text-slate-800 mb-4 pb-2 border-b uppercase text-xs tracking-widest">៤. ប្លង់ & View Mode</h3>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div>
                        <label class="label-sm">របៀបបង្ហាញ</label>
                        <select id="viewMode" onchange="updateCanvasStyles()" class="input-ui">
                            <option value="flow">ហូរឡើងលើ (Flow)</option>
                            <option value="single">បង្ហាញម្តងមួយ (Single)</option>
                            <option value="highlight">Highlight សារថ្មី</option>
                        </select>
                    </div>
                    <div>
                        <label class="label-sm">បង្ហាញយូរ (s)</label>
                        <input type="number" id="stayTime" value="2.5" step="0.5" class="input-ui">
                    </div>
                    <div>
                        <label class="label-sm">Canvas (W x H)</label>
                        <div class="flex gap-1">
                            <input type="number" id="canvasW" value="360" oninput="updateCanvasStyles()" class="input-ui px-1 text-center">
                            <input type="number" id="canvasH" value="640" oninput="updateCanvasStyles()" class="input-ui px-1 text-center">
                        </div>
                    </div>
                    <div>
                        <label class="label-sm">V-Align / Flow</label>
                        <select id="vAlign" onchange="updateCanvasStyles()" class="input-ui">
                            <option value="flex-end">ពីក្រោមឡើង (Bottom)</option>
                            <option value="flex-start">ពីលើចុះ (Top)</option>
                            <option value="center">ចំកណ្តាល (Center)</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4 mt-4 p-3 bg-slate-50 rounded-xl border border-slate-200">
                    <div>
                        <label class="label-sm text-blue-600">ចលនាចូល (Entry)</label>
                        <select id="entryAnim" onchange="updateCanvasStyles()" class="input-ui border-blue-200">
                            <option value="msg-entry-bottom">Slide Up (ឡើងលើ)</option>
                            <option value="msg-entry-left">Slide In Left (ពីឆ្វេង)</option>
                            <option value="msg-entry-right">Slide In Right (ពីស្តាំ)</option>
                            <option value="msg-entry-zoom">Zoom Pop (ពង្រីក)</option>
                        </select>
                    </div>
                    <div>
                        <label class="label-sm text-rose-600">ចលនាចេញ (Exit)</label>
                        <select id="exitAnim" onchange="updateCanvasStyles()" class="input-ui border-rose-200">
                            <option value="none">គ្មានចលនា</option>
                            <option value="msg-exit-fade">Fade Out (រលាយបាត់)</option>
                            <option value="msg-exit-top">Slide Out Top (ហើរឡើងលើ)</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- ៥. តួអង្គ & Profile -->
            <div class="control-section border-t-4 border-rose-500">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-black text-rose-600 text-lg uppercase">៥. តួអង្គ & ឋានៈ</h3>
                    <button onclick="addProfile()" class="bg-rose-600 text-white px-4 py-2 rounded-lg text-xs font-black shadow-lg hover:bg-rose-700 transition">+ បន្ថែមតួអង្គ</button>
                </div>
                <div id="profilesContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>

            <!-- ៦. បញ្ជីសារ & សំឡេង -->
            <div class="control-section border-t-4 border-emerald-500">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-black text-emerald-600 text-lg uppercase">៦. បញ្ជីសារ & សំឡេង (AUDIO FX)</h3>
                    <button onclick="addMessage()" class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-xs font-black shadow-lg hover:bg-emerald-700 transition">+ បន្ថែមសារ</button>
                </div>
                <div id="messagesContainer" class="space-y-4"></div>
            </div>

            <!-- ៧. Global Audio (ជាមួយ Ducking) -->
            <div class="control-section">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="font-black text-slate-800 uppercase text-xs tracking-widest">៧. សំឡេងរួម & AUDIO DUCKING</h3>
                    <div class="flex items-center gap-2">
                        <input type="checkbox" id="useDucking" checked class="w-4 h-4 cursor-pointer">
                        <label for="useDucking" class="text-[10px] font-black text-blue-600 uppercase">Auto Ducking BGM</label>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label class="label-sm">តន្ត្រីផ្ទៃក្រោយ (BGM)</label>
                        <input type="file" accept="audio/*" onchange="loadAudioFile(event, 'bgMusicPlayer')" class="text-xs w-full">
                    </div>
                    <div>
                        <label class="label-sm">Global SFX</label>
                        <input type="file" accept="audio/*" onchange="loadAudioFile(event, 'globalSfxPlayer')" class="text-xs w-full">
                    </div>
                    <div class="space-y-2">
                        <div class="flex justify-between">
                            <label class="label-sm">កម្រិត BGM ធម្មតា</label>
                            <span id="bgVolLabel" class="text-[10px] font-bold">30%</span>
                        </div>
                        <input type="range" id="bgVol" min="0" max="1" step="0.05" value="0.3" oninput="updateBgmVolumeUI()" class="w-full">
                        
                        <div class="flex justify-between pt-2">
                            <label class="label-sm text-blue-600">កម្រិត BGM ពេលមានសំឡេងនិយាយ</label>
                            <span id="duckVolLabel" class="text-[10px] font-bold">5%</span>
                        </div>
                        <input type="range" id="duckVol" min="0" max="0.5" step="0.05" value="0.05" oninput="updateBgmVolumeUI()" class="w-full">
                    </div>
                </div>
            </div>
        </div>

        <!-- ផ្នែកខាងស្តាំ: ការបង្ហាញផ្ទាល់ -->
        <div class="lg:col-span-4 flex flex-col items-center">
            <div class="sticky top-10">
                <div id="canvasWrapper">
                    <div id="bgLayer"></div>
                    <div id="mainCanvas" class="canvas-area">
                        <div id="messageFlow" class="flex flex-col w-full gap-4"></div>
                    </div>
                </div>
                <div class="mt-6 w-full max-w-[360px]">
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-[10px] font-black text-slate-400">AUDIO PROGRESS</span>
                            <span id="audioTimer" class="text-[10px] font-mono font-bold text-blue-600">00:00 / 00:00</span>
                        </div>
                        <div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                            <div id="musicProgress" class="bg-blue-600 h-full w-0 transition-all duration-300"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden Audio Engines -->
    <audio id="bgMusicPlayer" loop></audio>
    <audio id="globalSfxPlayer"></audio>

    <script>
        const apiKey = "";
        let audioCtx; 
        
        let state = {
            isPlaying: false,
            canvas: { 
                width: 360, height: 640, 
                bgImage: '', bgSize: 'cover', bgAnim: 'none', bgColor: '#000000',
                fontFamily: 'font-battambang', customFontName: 'LocalCustomFont', fontSize: 16, bubbleRadius: 20,
                viewMode: 'flow', vAlign: 'flex-end', stayTime: 2.5,
                entryAnim: 'msg-entry-bottom', exitAnim: 'none'
            },
            profiles: [
                { id: 'p1', name: 'មេបញ្ជាការ', role: 'Leader', color: '#1e293b', align: 'right', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Felix', scale: 1 },
                { id: 'p2', name: 'សុខា', role: 'Soldier', color: '#059669', align: 'left', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Jack', scale: 1 }
            ],
            messages: [
                { id: 'm1', profileId: 'p1', text: 'តើការងារបានសម្រេចដល់ណាហើយ?', delay: 1, sfx: '', voice: '', fx: { echo: 0, reverb: 0, eq: 1 } },
                { id: 'm2', profileId: 'p2', text: 'រួចរាល់ហើយទាន! កំពុងត្រៀមបញ្ជូន។', delay: 1.5, sfx: '', voice: '', fx: { echo: 0, reverb: 0, eq: 1 } }
            ]
        };

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // storage
        function saveToLocal() { localStorage.setItem('chat_anim_v73_ducking', JSON.stringify(state)); }
        function loadFromLocal() {
            const saved = localStorage.getItem('chat_anim_v73_ducking');
            if (saved) {
                state = JSON.parse(saved);
                state.isPlaying = false;
                syncUIFromState();
            }
        }
        function exportProject() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state));
            const dl = document.createElement('a'); dl.href = dataStr; dl.download = "chat_v73_" + Date.now() + ".json"; dl.click();
        }
        function importProject(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    state = JSON.parse(ev.target.result);
                    state.isPlaying = false;
                    syncUIFromState(); updateCanvasStyles(); renderProfiles(); renderMessages();
                } catch (err) { alert("Error!"); }
            };
            reader.readAsText(file);
        }

        function syncUIFromState() {
            document.getElementById('canvasW').value = state.canvas.width;
            document.getElementById('canvasH').value = state.canvas.height;
            document.getElementById('bgColor').value = state.canvas.bgColor;
            document.getElementById('bgSize').value = state.canvas.bgSize;
            document.getElementById('bgAnim').value = state.canvas.bgAnim;
            document.getElementById('fontFamily').value = state.canvas.fontFamily;
            document.getElementById('fontSize').value = state.canvas.fontSize;
            document.getElementById('bubbleRadius').value = state.canvas.bubbleRadius;
            document.getElementById('viewMode').value = state.canvas.viewMode;
            document.getElementById('stayTime').value = state.canvas.stayTime;
            document.getElementById('vAlign').value = state.canvas.vAlign;
            document.getElementById('entryAnim').value = state.canvas.entryAnim || 'msg-entry-bottom';
            document.getElementById('exitAnim').value = state.canvas.exitAnim || 'none';
        }

        function updateBgmVolumeUI() {
            const vol = document.getElementById('bgVol').value;
            const duck = document.getElementById('duckVol').value;
            document.getElementById('bgVolLabel').innerText = Math.round(vol * 100) + '%';
            document.getElementById('duckVolLabel').innerText = Math.round(duck * 100) + '%';
            
            // Apply volume instantly if music is already playing
            const bgMusic = document.getElementById('bgMusicPlayer');
            if (bgMusic && !state.duckingActive) {
                bgMusic.volume = vol;
            }
        }

        async function generateAIScript() {
            const topic = document.getElementById('aiTopic').value;
            const count = document.getElementById('aiMsgCount').value;
            if (!topic) return;
            document.getElementById('aiLoading').style.display = 'flex';
            const context = state.profiles.map(p => `Name: "${p.name}", Role: "${p.role}"`).join(' | ');
            const prompt = `Khmer conversation about ${topic}. Characters: ${context}. ${count} messages. JSON: [{"name": "Name", "text": "Khmer"}]`;
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } })
                });
                const data = await response.json();
                const script = JSON.parse(data.candidates[0].content.parts[0].text);
                state.messages = script.map((s, idx) => {
                    const profile = state.profiles.find(p => p.name === s.name) || state.profiles[idx % state.profiles.length];
                    return { id: 'm'+Date.now()+idx, profileId: profile.id, text: s.text, delay: 1.5, sfx: '', voice: '', fx: { echo: 0, reverb: 0, eq: 1 } };
                });
                renderMessages(); saveToLocal();
            } catch (e) { console.error(e); }
            finally { document.getElementById('aiLoading').style.display = 'none'; }
        }

        // UI Helpers
        function copyText(text) {
            const el = document.createElement('textarea'); el.value = text;
            document.body.appendChild(el); el.select();
            document.execCommand('copy'); document.body.removeChild(el);
            const toast = document.getElementById("toast");
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        function handleBgImage(e) {
            const f = e.target.files[0]; if (f) {
                const rd = new FileReader(); rd.onload = ev => { state.canvas.bgImage = ev.target.result; updateCanvasStyles(); saveToLocal(); }; rd.readAsDataURL(f);
            }
        }

        function handleLocalFont(e) {
            const f = e.target.files[0]; if (f) {
                const rd = new FileReader(); rd.onload = ev => {
                    const newFont = new FontFace(state.canvas.customFontName, `url(${ev.target.result})`);
                    newFont.load().then(loaded => {
                        document.fonts.add(loaded);
                        document.getElementById('optCustomFont').style.display = 'block';
                        document.getElementById('fontFamily').value = 'custom';
                        state.canvas.fontFamily = 'custom'; updateCanvasStyles(); saveToLocal();
                    });
                }; rd.readAsDataURL(f);
            }
        }

        // Profiles
        function renderProfiles() {
            const container = document.getElementById('profilesContainer'); container.innerHTML = '';
            state.profiles.forEach(p => {
                const div = document.createElement('div');
                div.className = 'p-4 bg-white rounded-xl border shadow-sm flex flex-col gap-3';
                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="relative w-12 h-12 shrink-0">
                            <img src="${p.avatar}" class="w-full h-full rounded-full border shadow-inner object-cover">
                            <input type="file" accept="image/*" onchange="handleAvatar(event, '${p.id}')" class="absolute inset-0 opacity-0 cursor-pointer">
                        </div>
                        <div class="flex-1 grid grid-cols-2 gap-2">
                            <input type="text" data-id="${p.id}" data-key="name" value="${p.name}" class="profile-input input-ui h-8 text-[11px] font-bold">
                            <input type="text" data-id="${p.id}" data-key="role" value="${p.role}" class="profile-input input-ui h-8 text-[11px] bg-slate-50">
                        </div>
                        <button onclick="removeProfile('${p.id}')" class="text-rose-400 hover:text-rose-600">✕</button>
                    </div>
                    <div class="flex items-center gap-4">
                        <input type="color" value="${p.color}" oninput="updateProfileQuiet('${p.id}', 'color', this.value)" class="w-8 h-8 rounded-lg cursor-pointer">
                        <div class="flex-1 flex items-center gap-2">
                            <span class="text-[9px] font-black">SCALE</span>
                            <input type="range" min="0.7" max="1.5" step="0.1" value="${p.scale}" oninput="updateProfileQuiet('${p.id}', 'scale', parseFloat(this.value))" class="flex-1 h-1 bg-slate-200 rounded-lg">
                        </div>
                        <select onchange="updateProfileQuiet('${p.id}', 'align', this.value)" class="text-[10px] font-bold">
                            <option value="left" ${p.align === 'left' ? 'selected' : ''}>ឆ្វេង</option>
                            <option value="right" ${p.align === 'right' ? 'selected' : ''}>ស្តាំ</option>
                        </select>
                    </div>
                `;
                container.appendChild(div);
            });
            container.querySelectorAll('.profile-input').forEach(input => {
                input.addEventListener('input', (e) => {
                    const profile = state.profiles.find(x => x.id === e.target.dataset.id);
                    if(profile) profile[e.target.dataset.key] = e.target.value;
                    saveToLocal(); if(e.target.dataset.key === 'name') renderMessages(); refreshStatic();
                });
            });
        }
        function updateProfileQuiet(id, k, v) { const p = state.profiles.find(x => x.id === id); if(p) p[k] = v; saveToLocal(); refreshStatic(); }
        function addProfile() { const id = 'p'+Date.now(); state.profiles.push({ id, name: 'ឈ្មោះ', role: 'តួនាទី', color: '#2563eb', align: 'left', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed='+id, scale: 1 }); renderProfiles(); renderMessages(); saveToLocal(); }
        function removeProfile(id) { state.profiles = state.profiles.filter(p => p.id !== id); renderProfiles(); renderMessages(); saveToLocal(); }
        function handleAvatar(e, id) { const f = e.target.files[0]; if(f){ const rd = new FileReader(); rd.onload = ev => { const p = state.profiles.find(x => x.id === id); if(p) p.avatar = ev.target.result; renderProfiles(); refreshStatic(); saveToLocal(); }; rd.readAsDataURL(f); } }

        // Messages
        function renderMessages() {
            const container = document.getElementById('messagesContainer'); container.innerHTML = '';
            state.messages.forEach((m, i) => {
                const fx = m.fx || { echo: 0, reverb: 0, eq: 1 };
                const div = document.createElement('div');
                div.className = 'bg-white p-3 rounded-xl border shadow-sm space-y-2';
                let opts = state.profiles.map(p => `<option value="${p.id}" ${m.profileId === p.id ? 'selected' : ''}>${p.name}</option>`).join('');
                div.innerHTML = `
                    <div class="flex gap-2">
                        <select onchange="updateMessage(${i}, 'profileId', this.value)" class="input-ui w-24 h-9 text-[10px] font-black">${opts}</select>
                        <div class="flex-1 flex gap-2 items-center">
                            <input type="text" value="${m.text}" oninput="updateMessage(${i}, 'text', this.value)" class="input-ui h-9 flex-1 text-xs">
                            <button onclick="copyText(state.messages[${i}].text)" title="ចម្លងអត្ថបទ" class="shrink-0 p-2 bg-slate-100 hover:bg-slate-200 rounded-lg text-slate-600 transition">
                                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                            </button>
                            <button onclick="toggleFXPanel(${i})" title="កំណត់សំឡេង FX" class="shrink-0 p-2 bg-blue-50 hover:bg-blue-100 rounded-lg text-blue-600 transition">
                                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 19V6l12-3v13M9 10l12-3"/></svg> FX
                            </button>
                        </div>
                        <button onclick="removeMessage(${i})" class="text-slate-300 hover:text-rose-500">✕</button>
                    </div>
                    
                    <div id="fxPanel_${i}" class="fx-panel">
                        <div class="grid grid-cols-3 gap-4">
                            <div>
                                <label class="label-sm text-[9px]">Echo (Delay)</label>
                                <input type="range" min="0" max="1" step="0.1" value="${fx.echo}" oninput="updateFX(${i}, 'echo', this.value)" class="w-full">
                            </div>
                            <div>
                                <label class="label-sm text-[9px]">Reverb (Wet)</label>
                                <input type="range" min="0" max="1" step="0.1" value="${fx.reverb}" oninput="updateFX(${i}, 'reverb', this.value)" class="w-full">
                            </div>
                            <div>
                                <label class="label-sm text-[9px]">EQ (Tone)</label>
                                <input type="range" min="0.1" max="2" step="0.1" value="${fx.eq}" oninput="updateFX(${i}, 'eq', this.value)" class="w-full">
                            </div>
                        </div>
                    </div>

                    <div class="flex flex-wrap gap-4 items-center">
                        <div class="flex-1 grid grid-cols-2 gap-2">
                            <div class="flex flex-col">
                                <span class="text-[8px] text-slate-400 font-bold uppercase">SFX</span>
                                <input type="file" accept="audio/*" onchange="handleMsgFile(event, ${i}, 'sfx')" class="text-[8px] w-full">
                            </div>
                            <div class="flex flex-col">
                                <span class="text-[8px] text-slate-400 font-bold uppercase">Voice</span>
                                <input type="file" accept="audio/*" onchange="handleMsgFile(event, ${i}, 'voice')" class="text-[8px] w-full">
                            </div>
                        </div>
                        <div class="flex items-center gap-1">
                             <label class="text-[9px] font-bold text-slate-400">DELAY</label>
                             <input type="number" value="${m.delay}" step="0.5" oninput="updateMessage(${i}, 'delay', parseFloat(this.value))" class="w-10 border rounded h-6 text-[10px] text-center">
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
            if (!state.isPlaying) refreshStatic();
        }

        function toggleFXPanel(i) {
            const p = document.getElementById(`fxPanel_${i}`);
            p.classList.toggle('active');
        }

        function updateFX(i, k, v) {
            if (!state.messages[i].fx) state.messages[i].fx = { echo: 0, reverb: 0, eq: 1 };
            state.messages[i].fx[k] = parseFloat(v);
            saveToLocal();
        }

        function updateMessage(i, k, v) { state.messages[i][k] = v; saveToLocal(); if(!state.isPlaying) refreshStatic(); }
        function addMessage() { state.messages.push({ id: 'm'+Date.now(), profileId: state.profiles[0].id, text: '...', delay: 1, sfx: '', voice: '', fx: { echo: 0, reverb: 0, eq: 1 } }); renderMessages(); saveToLocal(); }
        function removeMessage(i) { state.messages.splice(i, 1); renderMessages(); saveToLocal(); }

        // Ducking Logic
        async function fadeBgm(targetVol) {
            const useDucking = document.getElementById('useDucking').checked;
            if (!useDucking) return;
            
            const bgMusic = document.getElementById('bgMusicPlayer');
            if (!bgMusic.src) return;

            const duration = 500; // ms
            const startVol = bgMusic.volume;
            const startTime = performance.now();

            return new Promise(resolve => {
                function step(now) {
                    const elapsed = now - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    bgMusic.volume = startVol + (targetVol - startVol) * progress;
                    if (progress < 1) {
                        requestAnimationFrame(step);
                    } else {
                        resolve();
                    }
                }
                requestAnimationFrame(step);
            });
        }

        // Audio Engine
        async function playAudioWithFX(buffer, fxSettings) {
            initAudio();
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;

            let lastNode = source;

            // EQ
            const filter = audioCtx.createBiquadFilter();
            filter.type = "peaking";
            filter.frequency.value = 1000;
            filter.gain.value = (fxSettings.eq - 1) * 20; 
            lastNode.connect(filter);
            lastNode = filter;

            // Echo
            if (fxSettings.echo > 0) {
                const delay = audioCtx.createDelay();
                delay.delayTime.value = 0.3;
                const feedback = audioCtx.createGain();
                feedback.gain.value = fxSettings.echo * 0.5;
                lastNode.connect(delay);
                delay.connect(feedback);
                feedback.connect(delay);
                delay.connect(audioCtx.destination);
            }

            // Reverb Simulation
            if (fxSettings.reverb > 0) {
                const revGain = audioCtx.createGain();
                revGain.gain.value = fxSettings.reverb * 0.4;
                lastNode.connect(revGain);
                revGain.connect(audioCtx.destination);
            }

            lastNode.connect(audioCtx.destination);
            source.start(0);
            return new Promise(r => { source.onended = r; });
        }

        async function fetchAudioBuffer(url) {
            if (!url) return null;
            const resp = await fetch(url);
            const arrayBuf = await resp.arrayBuffer();
            return await audioCtx.decodeAudioData(arrayBuf);
        }

        // Playback Main
        async function playPreview() {
            if (state.isPlaying) return;
            initAudio();
            state.isPlaying = true;
            const flow = document.getElementById('messageFlow');
            const playBtn = document.getElementById('playBtn');
            const normalVol = parseFloat(document.getElementById('bgVol').value);
            const duckVol = parseFloat(document.getElementById('duckVol').value);
            
            flow.innerHTML = '';
            playBtn.innerHTML = `កំពុងផលិត...`;
            
            const bgMusic = document.getElementById('bgMusicPlayer');
            if (bgMusic.src) { 
                bgMusic.volume = normalVol; 
                bgMusic.currentTime = 0;
                bgMusic.play(); 
            }

            for (let i = 0; i < state.messages.length; i++) {
                const m = state.messages[i];
                if (!state.isPlaying) break;
                
                await new Promise(r => setTimeout(r, m.delay * 1000));
                
                if (state.canvas.viewMode === 'single') flow.innerHTML = '';
                if (state.canvas.viewMode === 'highlight') {
                    flow.querySelectorAll('.bubble-wrap').forEach(el => el.classList.add('inactive-msg'));
                }

                const bubble = renderBubble(m, true);
                bubble.classList.add('active-msg');

                // Global SFX
                const globalSfx = document.getElementById('globalSfxPlayer');
                if (globalSfx.src) { globalSfx.currentTime = 0; globalSfx.play(); }

                // Message SFX
                if (m.sfx) {
                    const sfxBuf = await fetchAudioBuffer(m.sfx);
                    if (sfxBuf) playAudioWithFX(sfxBuf, { echo: 0, reverb: 0, eq: 1 });
                }

                // Voice with Ducking
                if (m.voice) {
                    const voiceBuf = await fetchAudioBuffer(m.voice);
                    if (voiceBuf) {
                        state.duckingActive = true;
                        await fadeBgm(duckVol); // Lower BGM
                        await playAudioWithFX(voiceBuf, m.fx || { echo: 0, reverb: 0, eq: 1 });
                        await fadeBgm(normalVol); // Back to normal
                        state.duckingActive = false;
                    }
                } else {
                    await new Promise(r => setTimeout(r, state.canvas.stayTime * 1000));
                }
                
                if (state.canvas.exitAnim !== 'none' && state.isPlaying) {
                    bubble.classList.add(state.canvas.exitAnim);
                    await new Promise(r => setTimeout(r, 500));
                }
            }
            state.isPlaying = false;
            playBtn.innerHTML = `<svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> ផលិតវីដេអូ`;
        }

        function renderBubble(msg, animate) {
            const flow = document.getElementById('messageFlow');
            const p = state.profiles.find(x => x.id === msg.profileId) || state.profiles[0];
            const isRight = p.align === 'right';
            const entryAnim = state.canvas.entryAnim;
            const wrap = document.createElement('div');
            wrap.className = `bubble-wrap flex w-full ${isRight ? 'flex-row-reverse' : 'flex-row'} ${animate ? entryAnim : ''}`;
            const avatarSize = 40 * (p.scale || 1);
            const customFontInline = state.canvas.fontFamily === 'custom' ? `font-family: '${state.canvas.customFontName}';` : '';
            
            wrap.innerHTML = `
                <div style="width: ${avatarSize}px; height: ${avatarSize}px;" class="shrink-0 mx-2 self-end">
                    <img src="${p.avatar}" class="w-full h-full rounded-full border-2 border-white shadow-md object-cover">
                </div>
                <div class="flex flex-col ${isRight ? 'items-end' : 'items-start'} max-w-[75%]">
                    <span class="text-[9px] font-black mb-1 text-white/70 px-1 uppercase">${p.name} ${p.role ? `• ${p.role}` : ''}</span>
                    <div class="${state.canvas.fontFamily !== 'custom' ? state.canvas.fontFamily : ''} py-2.5 px-4 shadow-lg" style="${customFontInline} background-color: ${isRight ? p.color : '#ffffff'}; color: ${isRight ? '#ffffff' : '#1e293b'}; border-radius: ${state.canvas.bubbleRadius}px; ${isRight ? 'border-bottom-right-radius: 4px;' : 'border-bottom-left-radius: 4px;'} font-size: ${state.canvas.fontSize}px; line-height: 1.4;">${msg.text}</div>
                </div>
            `;
            flow.appendChild(wrap);
            const area = document.getElementById('mainCanvas');
            area.scrollTo({ top: state.canvas.vAlign === 'flex-end' ? area.scrollHeight : 0, behavior: 'smooth' });
            return wrap;
        }

        function updateCanvasStyles() {
            state.canvas.width = document.getElementById('canvasW').value;
            state.canvas.height = document.getElementById('canvasH').value;
            state.canvas.fontFamily = document.getElementById('fontFamily').value;
            state.canvas.fontSize = document.getElementById('fontSize').value;
            state.canvas.bubbleRadius = document.getElementById('bubbleRadius').value;
            state.canvas.viewMode = document.getElementById('viewMode').value;
            state.canvas.vAlign = document.getElementById('vAlign').value;
            state.canvas.stayTime = parseFloat(document.getElementById('stayTime').value);
            state.canvas.bgColor = document.getElementById('bgColor').value;
            state.canvas.bgSize = document.getElementById('bgSize').value;
            state.canvas.bgAnim = document.getElementById('bgAnim').value;
            state.canvas.entryAnim = document.getElementById('entryAnim').value;
            state.canvas.exitAnim = document.getElementById('exitAnim').value;

            const wrapper = document.getElementById('canvasWrapper');
            wrapper.style.width = state.canvas.width + 'px';
            wrapper.style.height = state.canvas.height + 'px';
            wrapper.style.backgroundColor = state.canvas.bgColor;
            
            const bg = document.getElementById('bgLayer');
            bg.style.backgroundImage = state.canvas.bgImage ? `url(${state.canvas.bgImage})` : 'none';
            bg.style.backgroundSize = state.canvas.bgSize;
            bg.classList.remove('anim-zoom', 'anim-pan', 'anim-pulse');
            if (state.canvas.bgAnim !== 'none') bg.classList.add(state.canvas.bgAnim);
            
            document.getElementById('mainCanvas').style.alignItems = state.canvas.vAlign;
            saveToLocal(); if (!state.isPlaying) refreshStatic();
        }

        function refreshStatic() {
            const flow = document.getElementById('messageFlow'); flow.innerHTML = '';
            state.messages.forEach(m => renderBubble(m, false));
        }

        window.loadAudioFile = (e, tid) => { const f = e.target.files[0]; if(f){ const rd = new FileReader(); rd.onload = ev => { document.getElementById(tid).src = ev.target.result; saveToLocal(); }; rd.readAsDataURL(f); } };
        window.handleMsgFile = (e, i, k) => { const f = e.target.files[0]; if(f){ const rd = new FileReader(); rd.onload = ev => { state.messages[i][k] = ev.target.result; saveToLocal(); }; rd.readAsDataURL(f); } };

        const bgAudio = document.getElementById('bgMusicPlayer');
        bgAudio.ontimeupdate = function() {
            const progress = (this.currentTime / this.duration) * 100;
            document.getElementById('musicProgress').style.width = (progress || 0) + '%';
            const fmt = (s) => Math.floor(s/60).toString().padStart(2,'0') + ':' + Math.floor(s%60).toString().padStart(2,'0');
            document.getElementById('audioTimer').innerText = `${fmt(this.currentTime)} / ${fmt(this.duration || 0)}`;
        };

        window.onload = () => { loadFromLocal(); updateBgmVolumeUI(); updateCanvasStyles(); renderProfiles(); renderMessages(); };
    </script>
</body>
